---
# OADP Setup Playbook
# This playbook installs and configures OADP (OpenShift API for Data Protection)
# using MinIO as the S3-compatible storage backend
#
# Prerequisites:
#   - MinIO must be deployed (run setup-minio.yaml first)
#   - You need MinIO service account credentials (access key and secret key)
#
# Usage:
#   ansible-playbook setup-oadp.yaml -e minio_access_key_id=<KEY_ID> -e minio_secret_access_key=<SECRET_KEY>
#   ansible-playbook setup-oadp.yaml -e minio_access_key_id=<KEY_ID> -e minio_secret_access_key=<SECRET_KEY> -e minio_namespace=minio
#   ansible-playbook setup-oadp.yaml -e minio_access_key_id=<KEY_ID> -e minio_secret_access_key=<SECRET_KEY> -e oadp_channel=stable-1.5

- name: Setup OADP with MinIO
  hosts: localhost
  gather_facts: false
  vars:
    oadp_namespace: "openshift-adp"
    oadp_channel: "stable-1.4"
    minio_namespace: "minio"
    minio_bucket_name: "velero"
    minio_region: "minio"
    enable_node_agent: true
    # minio_access_key_id: ""  # Must be provided via -e
    # minio_secret_access_key: ""  # Must be provided via -e

  tasks:
    - name: Verify MinIO credentials are provided
      ansible.builtin.fail:
        msg: |
          MinIO credentials are required!

          Usage:
            ansible-playbook setup-oadp.yaml -e minio_access_key_id=<ACCESS_KEY_ID> -e minio_secret_access_key=<SECRET_ACCESS_KEY>

          If you don't have credentials yet:
            1. Run setup-minio.yaml playbook first
            2. Use the service account credentials from the output
      when: minio_access_key_id is not defined or minio_secret_access_key is not defined

    - name: Print setup header
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "OADP Setup with MinIO"
          - "========================================"
          - "OADP Namespace: {{ oadp_namespace }}"
          - "OADP Channel: {{ oadp_channel }}"
          - "MinIO Namespace: {{ minio_namespace }}"
          - "MinIO Bucket: {{ minio_bucket_name }}"
          - "Node Agent (Kopia): {{ enable_node_agent }}"

    - name: Verify MinIO is running
      ansible.builtin.shell: |
        oc get deployment minio -n {{ minio_namespace }}
      register: minio_check
      changed_when: false
      failed_when: false

    - name: Fail if MinIO is not running
      ansible.builtin.fail:
        msg: |
          MinIO deployment not found in namespace {{ minio_namespace }}!

          Please run setup-minio.yaml playbook first:
            ansible-playbook setup-minio.yaml
      when: minio_check.rc != 0

    - name: Create OADP namespace
      ansible.builtin.shell: |
        oc create namespace {{ oadp_namespace }} --dry-run=client -o yaml | oc apply -f -
      changed_when: true

    - name: Create OperatorGroup for OADP
      ansible.builtin.shell: |
        cat <<EOF | oc apply -f -
        apiVersion: operators.coreos.com/v1
        kind: OperatorGroup
        metadata:
          name: openshift-adp-operator-group
          namespace: {{ oadp_namespace }}
        spec:
          targetNamespaces:
          - {{ oadp_namespace }}
        EOF
      changed_when: true

    - name: Create Subscription for OADP operator
      ansible.builtin.shell: |
        cat <<EOF | oc apply -f -
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: redhat-oadp-operator
          namespace: {{ oadp_namespace }}
        spec:
          channel: {{ oadp_channel }}
          installPlanApproval: Automatic
          name: redhat-oadp-operator
          source: redhat-operators
          sourceNamespace: openshift-marketplace
        EOF
      changed_when: true

    - name: Wait for OADP operator to be ready
      ansible.builtin.shell: |
        oc wait --for=condition=ready --timeout=300s pod -l control-plane=controller-manager -n {{ oadp_namespace }}
      changed_when: false
      register: operator_wait
      retries: 30
      delay: 10
      until: operator_wait.rc == 0

    - name: Print operator ready status
      ansible.builtin.debug:
        msg: "✓ OADP Operator is ready"

    - name: Create cloud credentials secret
      ansible.builtin.shell: |
        cat <<EOF > /tmp/credentials-velero
        [default]
        aws_access_key_id={{ minio_access_key_id }}
        aws_secret_access_key={{ minio_secret_access_key }}
        EOF

        oc create secret generic cloud-credentials \
          --from-file cloud=/tmp/credentials-velero \
          -n {{ oadp_namespace }} \
          --dry-run=client -o yaml | oc apply -f -

        rm /tmp/credentials-velero
      changed_when: true

    - name: Print cloud credentials status
      ansible.builtin.debug:
        msg: "✓ Cloud credentials secret created"

    - name: Get MinIO API URL
      ansible.builtin.shell: |
        oc get route minio-api -n {{ minio_namespace }} -o jsonpath='{.spec.host}'
      register: minio_api_url
      changed_when: false

    - name: Print DPA configuration note
      ansible.builtin.debug:
        msg:
          - "Creating DataProtectionApplication (DPA) for CSI snapshots..."
          - ""
          - "Note: snapshotLocations is NOT configured in this DPA."
          - "This is intentional! snapshotLocations is only for cloud provider snapshots"
          - "(AWS EBS, Azure Disk, GCP PD). For CSI snapshots (LVMS, Ceph, etc.),"
          - "omitting snapshotLocations allows OADP to use the CSI VolumeSnapshot API."
          - ""
          - "CSI snapshots are configured via VolumeSnapshotClass with the"
          - "velero.io/csi-volumesnapshot-class=true label (created later in this playbook)."

    - name: Create DataProtectionApplication
      ansible.builtin.shell: |
        cat <<EOF | oc apply -f -
        apiVersion: oadp.openshift.io/v1alpha1
        kind: DataProtectionApplication
        metadata:
          name: velero
          namespace: {{ oadp_namespace }}
        spec:
          configuration:
            velero:
              defaultPlugins:
              - openshift
              - aws
              - csi
            nodeAgent:
              enable: {{ enable_node_agent | lower }}
              uploaderType: kopia
          backupLocations:
          - velero:
              provider: aws
              default: true
              objectStorage:
                bucket: {{ minio_bucket_name }}
                prefix: rhoso
              config:
                region: {{ minio_region }}
                s3ForcePathStyle: "true"
                s3Url: https://{{ minio_api_url.stdout }}
                insecureSkipTLSVerify: "true"
              credential:
                name: cloud-credentials
                key: cloud
        EOF
      changed_when: true

    - name: Wait for Velero pod to be ready
      ansible.builtin.shell: |
        oc wait --for=condition=ready --timeout=300s pod -l app.kubernetes.io/name=velero -n {{ oadp_namespace }}
      changed_when: false
      register: velero_wait
      retries: 30
      delay: 10
      until: velero_wait.rc == 0

    - name: Print Velero ready status
      ansible.builtin.debug:
        msg: "✓ Velero pod is ready"

    - name: Wait for node-agent pods to be ready
      ansible.builtin.shell: |
        oc wait --for=condition=ready --timeout=300s pod -l app.kubernetes.io/name=node-agent -n {{ oadp_namespace }}
      changed_when: false
      failed_when: false
      when: enable_node_agent

    - name: Get OADP pods
      ansible.builtin.shell: |
        oc get pods -n {{ oadp_namespace }}
      register: oadp_pods
      changed_when: false

    - name: Display OADP pods
      ansible.builtin.debug:
        msg: "{{ oadp_pods.stdout_lines }}"

    - name: Check for existing VolumeSnapshotClass
      ansible.builtin.shell: |
        oc get volumesnapshotclass -o json
      register: vsc_list
      changed_when: false
      failed_when: false

    - name: Create VolumeSnapshotClass for OADP (TopoLVM/LVMS)
      ansible.builtin.shell: |
        cat <<EOF | oc apply -f -
        apiVersion: snapshot.storage.k8s.io/v1
        kind: VolumeSnapshotClass
        metadata:
          name: lvms-velero
          labels:
            velero.io/csi-volumesnapshot-class: "true"
          annotations:
            snapshot.storage.kubernetes.io/is-default-class: "false"
        driver: topolvm.io
        deletionPolicy: Retain
        EOF
      changed_when: true
      when: vsc_list.stdout | from_json | json_query('items[?driver==`topolvm.io`]') | length > 0

    - name: Print VolumeSnapshotClass status
      ansible.builtin.debug:
        msg: "✓ VolumeSnapshotClass 'lvms-velero' created for OADP CSI snapshots"
      when: vsc_list.stdout | from_json | json_query('items[?driver==`topolvm.io`]') | length > 0

    - name: Skip VolumeSnapshotClass creation
      ansible.builtin.debug:
        msg: "⚠️  No TopoLVM driver found. If using different CSI driver, manually create VolumeSnapshotClass with velero.io/csi-volumesnapshot-class=true label"
      when: vsc_list.stdout | from_json | json_query('items[?driver==`topolvm.io`]') | length == 0

    - name: Wait for BackupStorageLocation to be available
      ansible.builtin.shell: |
        for i in {1..30}; do
          PHASE=$(oc get backupstoragelocation -n {{ oadp_namespace }} -o jsonpath='{.items[0].status.phase}' 2>/dev/null)
          if [ "$PHASE" = "Available" ]; then
            echo "BackupStorageLocation is Available"
            exit 0
          fi
          echo "Waiting for BackupStorageLocation... (attempt $i/30)"
          sleep 10
        done
        echo "Warning: BackupStorageLocation not available after 5 minutes"
        exit 1
      register: bsl_status
      changed_when: false
      failed_when: false

    - name: Get BackupStorageLocation status
      ansible.builtin.shell: |
        oc get backupstoragelocation -n {{ oadp_namespace }}
      register: bsl_output
      changed_when: false

    - name: Display BackupStorageLocation status
      ansible.builtin.debug:
        msg: "{{ bsl_output.stdout_lines }}"

    - name: Get BackupStorageLocation details
      ansible.builtin.shell: |
        oc get backupstoragelocation -n {{ oadp_namespace }} -o yaml
      register: bsl_details
      changed_when: false
      when: bsl_status.rc != 0

    - name: Display BackupStorageLocation details if not available
      ansible.builtin.debug:
        msg: "{{ bsl_details.stdout_lines }}"
      when: bsl_status.rc != 0

    - name: Check Velero logs for errors
      ansible.builtin.shell: |
        oc logs -n {{ oadp_namespace }} deployment/velero --tail=50
      register: velero_logs
      changed_when: false
      when: bsl_status.rc != 0

    - name: Display Velero logs if BSL not available
      ansible.builtin.debug:
        msg: "{{ velero_logs.stdout_lines }}"
      when: bsl_status.rc != 0

    - name: Print success summary
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "OADP Setup Complete!"
          - "========================================"
          - ""
          - "OADP Namespace: {{ oadp_namespace }}"
          - "MinIO API: https://{{ minio_api_url.stdout }}"
          - "Bucket: {{ minio_bucket_name }}"
          - ""
          - "BackupStorageLocation Status: {{ bsl_status.stdout if bsl_status.rc == 0 else 'Check manually with: oc get backupstoragelocation -n ' + oadp_namespace }}"
          - ""
          - "To test OADP:"
          - "  1. Create a test namespace and resources"
          - "  2. Create a backup:"
          - "     oc create -f - <<EOF"
          - "     apiVersion: velero.io/v1"
          - "     kind: Backup"
          - "     metadata:"
          - "       name: test-backup"
          - "       namespace: {{ oadp_namespace }}"
          - "     spec:"
          - "       includedNamespaces:"
          - "       - test-namespace"
          - "       snapshotMoveData: true"
          - "       storageLocation: velero-1"
          - "     EOF"
          - ""
          - "  3. Check backup status:"
          - "     oc get backup -n {{ oadp_namespace }}"
          - ""
          - "  4. Restore from backup:"
          - "     oc create -f - <<EOF"
          - "     apiVersion: velero.io/v1"
          - "     kind: Restore"
          - "     metadata:"
          - "       name: test-restore"
          - "       namespace: {{ oadp_namespace }}"
          - "     spec:"
          - "       backupName: test-backup"
          - "     EOF"
          - ""
          - "For more information, see: docs/dev/setup-oadp-minio.md"
      when: bsl_status.rc == 0

    - name: Print troubleshooting summary
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "OADP Setup Complete with Warnings"
          - "========================================"
          - ""
          - "BackupStorageLocation is not yet available."
          - "This may be normal if MinIO is still initializing."
          - ""
          - "To troubleshoot:"
          - "  1. Check BackupStorageLocation:"
          - "     oc get backupstoragelocation -n {{ oadp_namespace }} -o yaml"
          - ""
          - "  2. Check Velero logs:"
          - "     oc logs -n {{ oadp_namespace }} deployment/velero"
          - ""
          - "  3. Verify MinIO is accessible:"
          - "     curl -v https://{{ minio_api_url.stdout }}"
          - ""
          - "  4. Verify cloud credentials:"
          - "     oc get secret cloud-credentials -n {{ oadp_namespace }} -o yaml"
          - ""
          - "Common issues:"
          - "  - Authentication errors: Verify MinIO access/secret keys"
          - "  - Connection errors: Verify MinIO route is accessible"
          - "  - Bucket not found: Verify bucket '{{ minio_bucket_name }}' exists in MinIO"
          - ""
          - "For more information, see: docs/dev/setup-oadp-minio.md"
      when: bsl_status.rc != 0
