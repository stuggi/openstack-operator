---
# OpenStack Cleanup Playbook for Backup/Restore
#
# Cleans up OpenStack control plane and data plane resources to prepare
# for a restore from OADP backup.
#
# IMPORTANT: This will delete all OpenStack resources in the target namespace!
#
# Usage:
#   ansible-playbook docs/dev/backup-restore/cleanup/cleanup-openstack.yaml
#   ansible-playbook docs/dev/backup-restore/cleanup/cleanup-openstack.yaml -e skip_confirmation=true
#
#   # Skip dataplane cleanup:
#   ansible-playbook docs/dev/backup-restore/cleanup/cleanup-openstack.yaml -e cleanup_dataplane=false
#
#   # Skip controlplane cleanup (dataplane only):
#   ansible-playbook docs/dev/backup-restore/cleanup/cleanup-openstack.yaml -e cleanup_ctlplane=false
#
#   # Data Mover: also delete labeled PVCs so restore recreates them from snapshots:
#   ansible-playbook docs/dev/backup-restore/cleanup/cleanup-openstack.yaml -e snapshot_move_data=true
#
# Variables:
#   openstack_namespace: Target namespace (default: openstack)
#   cleanup_ctlplane: Clean up control plane resources (default: true)
#   cleanup_dataplane: Clean up data plane resources (default: true)
#   snapshot_move_data: Delete PVCs labeled for backup so Data Mover restores
#     them from snapshots (default: false)
#   skip_confirmation: Skip the confirmation prompt (default: false)

- name: OpenStack Cleanup for Restore
  hosts: localhost
  gather_facts: false

  vars:
    openstack_namespace: openstack
    cleanup_ctlplane: true
    cleanup_dataplane: true
    snapshot_move_data: false
    skip_confirmation: false

  tasks:
    - name: Print cleanup header
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "OpenStack Cleanup for Restore"
          - "========================================"
          - "Namespace: {{ openstack_namespace }}"
          - "Cleanup ControlPlane: {{ cleanup_ctlplane }}"
          - "Cleanup DataPlane: {{ cleanup_dataplane }}"
          - "Delete labeled PVCs (Data Mover): {{ snapshot_move_data }}"
          - ""
          - "WARNING: This will delete OpenStack resources!"

    - name: Check if namespace exists
      ansible.builtin.shell: |
        oc get namespace {{ openstack_namespace }}
      register: namespace_check
      changed_when: false
      failed_when: false

    - name: Exit if namespace doesn't exist
      ansible.builtin.debug:
        msg: "Namespace {{ openstack_namespace }} does not exist. Nothing to clean up."
      when: namespace_check.rc != 0

    - name: End playbook if namespace doesn't exist
      ansible.builtin.meta: end_play
      when: namespace_check.rc != 0

    - name: Gather resource counts
      ansible.builtin.shell: |
        echo "OpenStackControlPlane: $(oc get openstackcontrolplane -n {{ openstack_namespace }} --no-headers 2>/dev/null | wc -l)"
        echo "DataPlaneNodeSets: $(oc get openstackdataplanenodeset -n {{ openstack_namespace }} --no-headers 2>/dev/null | wc -l)"
        echo "DataPlaneDeployments: $(oc get openstackdataplanedeployment -n {{ openstack_namespace }} --no-headers 2>/dev/null | wc -l)"
        echo "GaleraBackup: $(oc get galerabackup -n {{ openstack_namespace }} --no-headers 2>/dev/null | wc -l)"
        echo "GaleraRestore: $(oc get galerarestore -n {{ openstack_namespace }} --no-headers 2>/dev/null | wc -l)"
        echo "Labeled PVCs: $(oc get pvc -n {{ openstack_namespace }} -l backup.openstack.org/backup=true --no-headers 2>/dev/null | wc -l)"
        echo "Galera PVCs: $(oc get pvc -n {{ openstack_namespace }} -l app=galera --no-headers 2>/dev/null | wc -l)"
        echo "PVC-pin Deployments: $(oc get deployment -n {{ openstack_namespace }} -l app=pvc-pin --no-headers 2>/dev/null | wc -l)"
      register: resource_counts
      changed_when: false

    - name: Display found resources
      ansible.builtin.debug:
        msg: "{{ resource_counts.stdout_lines }}"

    - name: Confirm deletion
      ansible.builtin.pause:
        prompt: |

          Resources found in namespace {{ openstack_namespace }}:
          {{ resource_counts.stdout }}

          This will DELETE:
          {% if cleanup_ctlplane | bool %}
          - GaleraRestore and GaleraBackup CRs
          - OpenStackControlPlane CR and all operator-managed pods/services
          - OpenStackBackupConfig and OpenStackVersion CRs
          - Galera database PVCs (app=galera)
          - RabbitMQUser CRs and restored-user secrets
          - Certificate secrets (excluding EDPM/compute/Ceph certs)
          - CA bundle secrets
          - PVC-pin dummy Deployments (from failed restores)
          {% endif %}
          {% if cleanup_dataplane | bool %}
          - OpenStackDataPlaneDeployment CRs
          - OpenStackDataPlaneNodeSet CRs
          - OpenStackDataPlaneService CRs
          - NetConfig CRs
          {% endif %}
          {% if snapshot_move_data | bool %}
          - All PVCs labeled backup.openstack.org/backup=true (Data Mover)
          {% endif %}

          Continue with cleanup? (yes/no)
      register: delete_confirm
      when: not (skip_confirmation | bool)

    - name: Fail if not confirmed
      ansible.builtin.fail:
        msg: "Cleanup cancelled by user"
      when: not (skip_confirmation | bool) and delete_confirm.user_input != "yes"

    # ========================================
    # DataPlane Cleanup
    # ========================================
    - name: "DataPlane cleanup"
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "DataPlane Cleanup"
          - "========================================"
      when: cleanup_dataplane | bool

    - name: Delete DataPlaneDeployment CRs
      ansible.builtin.shell: |
        oc delete openstackdataplanedeployment --all -n {{ openstack_namespace }}
      changed_when: true
      failed_when: false
      when: cleanup_dataplane | bool

    - name: Delete DataPlaneNodeSet CRs
      ansible.builtin.shell: |
        oc delete openstackdataplanenodeset --all -n {{ openstack_namespace }}
      changed_when: true
      failed_when: false
      when: cleanup_dataplane | bool

    - name: Delete DataPlaneService CRs
      ansible.builtin.shell: |
        oc delete openstackdataplaneservice --all -n {{ openstack_namespace }}
      changed_when: true
      failed_when: false
      when: cleanup_dataplane | bool

    - name: Delete NetConfig CRs
      ansible.builtin.shell: |
        oc delete netconfig --all -n {{ openstack_namespace }}
      changed_when: true
      failed_when: false
      when: cleanup_dataplane | bool

    - name: Wait for dataplane pods to terminate
      ansible.builtin.shell: |
        oc get pods -n {{ openstack_namespace }} -l app=openstackansibleee --no-headers 2>/dev/null | wc -l
      register: dp_pod_count
      until: dp_pod_count.stdout|int == 0
      retries: 30
      delay: 10
      changed_when: false
      failed_when: false
      when: cleanup_dataplane | bool

    - name: Print dataplane cleanup status
      ansible.builtin.debug:
        msg: "DataPlane resources deleted"
      when: cleanup_dataplane | bool

    # ========================================
    # ControlPlane Cleanup
    # ========================================
    - name: "ControlPlane cleanup"
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "ControlPlane Cleanup"
          - "========================================"
      when: cleanup_ctlplane | bool

    - name: Delete PVC-pin dummy Deployments (from failed restores)
      ansible.builtin.shell: |
        oc delete deployment -n {{ openstack_namespace }} -l app=pvc-pin --ignore-not-found=true
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Delete openstack-restore-tmp namespace (from failed RabbitMQ restore)
      ansible.builtin.shell: |
        if oc get namespace openstack-restore-tmp &>/dev/null; then
          for SECRET in $(oc get secret -n openstack-restore-tmp -o name 2>/dev/null); do
            oc patch ${SECRET} -n openstack-restore-tmp --type=merge -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
          done
          oc delete namespace openstack-restore-tmp --wait=true --timeout=60s
        fi
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Delete GaleraRestore CRs
      ansible.builtin.shell: |
        oc delete galerarestore --all -n {{ openstack_namespace }} --wait=true
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Delete GaleraBackup CRs
      ansible.builtin.shell: |
        oc delete galerabackup --all -n {{ openstack_namespace }} --wait=true
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Delete OpenStackControlPlane CR
      ansible.builtin.shell: |
        oc delete openstackcontrolplane --all -n {{ openstack_namespace }}
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Wait for initial cleanup (30 seconds)
      ansible.builtin.pause:
        seconds: 30
      when: cleanup_ctlplane | bool

    - name: Wait for pods to terminate
      ansible.builtin.shell: |
        oc get pods -n {{ openstack_namespace }} --field-selector='status.phase!=Succeeded' --no-headers 2>/dev/null | wc -l
      register: pod_count
      until: pod_count.stdout|int == 0
      retries: 60
      delay: 10
      changed_when: false
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Check for stuck pods
      ansible.builtin.shell: |
        oc get pods -n {{ openstack_namespace }} --field-selector='status.phase!=Succeeded' --no-headers -o name 2>/dev/null
      register: stuck_pods
      changed_when: false
      failed_when: false
      when: cleanup_ctlplane | bool and pod_count.stdout|int > 0

    - name: Force delete stuck pods
      ansible.builtin.shell: |
        oc delete {{ stuck_pods.stdout_lines | join(' ') }} -n {{ openstack_namespace }} --force --grace-period=0
      changed_when: true
      when: cleanup_ctlplane | bool and pod_count.stdout|int > 0 and stuck_pods.stdout != ""

    - name: Wait after force delete
      ansible.builtin.shell: |
        oc get pods -n {{ openstack_namespace }} --field-selector='status.phase!=Succeeded' --no-headers 2>/dev/null | wc -l
      register: pod_count_final
      until: pod_count_final.stdout|int == 0
      retries: 30
      delay: 5
      changed_when: false
      failed_when: false
      when: cleanup_ctlplane | bool and pod_count.stdout|int > 0 and stuck_pods.stdout != ""

    - name: Print pod cleanup status
      ansible.builtin.debug:
        msg: "All pods terminated"
      when: cleanup_ctlplane | bool

    - name: Delete OpenStackBackupConfig CRs
      ansible.builtin.shell: |
        oc delete openstackbackupconfig --all -n {{ openstack_namespace }}
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Delete OpenStackVersion CRs
      ansible.builtin.shell: |
        oc delete openstackversion --all -n {{ openstack_namespace }}
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Delete Galera database PVCs
      ansible.builtin.shell: |
        oc delete pvc -n {{ openstack_namespace }} -l app=galera
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Delete RabbitMQUser CRs
      ansible.builtin.shell: |
        oc delete rabbitmquser --all -n {{ openstack_namespace }}
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Delete RabbitMQ restored-user secrets
      ansible.builtin.shell: |
        for secret in $(oc get secret -n {{ openstack_namespace }} -o name | grep '\-restored-user$'); do
          oc delete -n {{ openstack_namespace }} $secret
        done
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Get compute node prefixes from dataplanes
      ansible.builtin.shell: |
        oc get openstackdataplanenodeset -n {{ openstack_namespace }} -o json 2>/dev/null | jq -r '[.items[].status.allHostnames // {} | keys[0] | sub("-[0-9]+$"; "")] | unique | join("|")'
      register: compute_prefixes
      changed_when: false
      failed_when: false
      when: cleanup_ctlplane | bool

    - name: Delete cert secrets (with compute prefix exclusion)
      ansible.builtin.shell: |
        for i in $(oc get secret -n {{ openstack_namespace }} -o name | grep cert | grep -v edpm | grep -vE "({{ compute_prefixes.stdout }})" | grep -v ceph); do
          oc delete -n {{ openstack_namespace }} $i
        done
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool and compute_prefixes.stdout != ""

    - name: Delete cert secrets (fallback without compute prefix)
      ansible.builtin.shell: |
        for i in $(oc get secret -n {{ openstack_namespace }} -o name | grep cert | grep -v edpm | grep -v ceph); do
          oc delete -n {{ openstack_namespace }} $i
        done
      changed_when: true
      failed_when: false
      when: cleanup_ctlplane | bool and compute_prefixes.stdout == ""

    - name: Delete CA bundle secrets
      ansible.builtin.shell: |
        oc delete secret -n {{ openstack_namespace }} rootca-internal rootca-libvirt rootca-ovn rootca-public combined-ca-bundle 2>/dev/null || true
      changed_when: true
      when: cleanup_ctlplane | bool

    - name: Print controlplane cleanup status
      ansible.builtin.debug:
        msg: "ControlPlane resources deleted"
      when: cleanup_ctlplane | bool

    # ========================================
    # Delete labeled PVCs (Data Mover)
    # ========================================
    - name: "Delete labeled PVCs for Data Mover restore"
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "Delete Labeled PVCs (Data Mover)"
          - "========================================"
          - "Deleting PVCs with backup.openstack.org/backup=true"
          - "These will be restored from CSI snapshots via Data Mover"
      when: snapshot_move_data | bool

    - name: Delete PVCs labeled for backup
      ansible.builtin.shell: |
        oc delete pvc -n {{ openstack_namespace }} -l backup.openstack.org/backup=true
      changed_when: true
      failed_when: false
      when: snapshot_move_data | bool

    - name: Print PVC cleanup status
      ansible.builtin.debug:
        msg: "Labeled PVCs deleted - will be restored from Data Mover snapshots"
      when: snapshot_move_data | bool

    # ========================================
    # Summary
    # ========================================
    - name: Verify cleanup
      ansible.builtin.shell: |
        oc get all,pvc -n {{ openstack_namespace }}
      register: remaining_resources
      changed_when: false
      failed_when: false

    - name: Display remaining resources
      ansible.builtin.debug:
        msg: "{{ remaining_resources.stdout_lines }}"

    - name: Print completion summary
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "Cleanup Complete"
          - "========================================"
          - ""
          - "Namespace {{ openstack_namespace }} is ready for restore."
          - ""
          - "To restore from backup:"
          - "  ansible-playbook docs/dev/backup-restore/restore/restore-openstack.yaml \\"
          - "    -e backup_timestamp=YYYYMMDD-HHMMSS"
