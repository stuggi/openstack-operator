---
# Resource Modifier ConfigMap for Velero Restores
#
# This ConfigMap must be created in the OADP namespace before running any
# restore CRs. It defines four rules:
#
# 1. Strip kubectl.kubernetes.io/last-applied-configuration from all resources
#    (can be too large and cause restore failures, unnecessary after restore)
#
# 2. Add core.openstack.org/deployment-stage=infrastructure-only to
#    OpenStackControlPlane CRs (staged deployment - only infra services start)
#
# 3. Set spec.disabled=True on InstanceHa CRs to prevent fencing of EDPM
#    nodes before they reconnect to the restored control plane
#
# 4. (Data Mover only) Change PVC StorageClass to use Immediate binding mode.
#    Required when restoring from BackupStorageLocation (S3/MinIO) with a
#    WaitForFirstConsumer StorageClass (e.g., LVM/topolvm). Without this,
#    PVC restores deadlock because the data mover waits for a consumer pod
#    that doesn't exist yet. See velero#7561.
#    IMPORTANT: Create the Immediate StorageClass before restoring.
#    Adjust the storageClassName values below to match your environment.
#
# Usage:
#   oc apply -f 00-resource-modifiers-configmap.yaml
#
# This is created automatically by the restore playbook (restore-openstack.yaml).
# Only needed when running manual restores with the individual restore CRs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openstack-restore-resource-modifiers
  namespace: openshift-adp
data:
  resource-modifiers.yaml: |
    version: v1
    resourceModifierRules:
    - conditions:
        groupResource: "*"
        namespaces:
        - openstack
      mergePatches:
      - patchData: |
          metadata:
            annotations:
              kubectl.kubernetes.io/last-applied-configuration: null
    - conditions:
        groupResource: openstackcontrolplanes.core.openstack.org
        namespaces:
        - openstack
      mergePatches:
      - patchData: |
          metadata:
            annotations:
              kubectl.kubernetes.io/last-applied-configuration: null
              core.openstack.org/deployment-stage: "infrastructure-only"
    - conditions:
        groupResource: instancehas.instanceha.openstack.org
        namespaces:
        - openstack
      mergePatches:
      - patchData: |
          spec:
            disabled: "True"
    # Rule 4: Change PVC StorageClass to Immediate binding (Data Mover only)
    # Uncomment and adjust the storageClassName values for your environment.
    # Create the Immediate StorageClass first (see README.md).
    #- conditions:
    #    groupResource: persistentvolumeclaims
    #    namespaces:
    #    - openstack
    #  jsonPatches:
    #  - path: "/spec/storageClassName"
    #    operation: replace
    #    value: "lvms-local-storage-immediate"
