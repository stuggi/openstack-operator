---
# Full OpenStack Restore Playbook
#
# Restores an OpenStack control plane from OADP backups using ordered
# Velero Restore CRs and automated database restore.
#
# Restore order:
# 1. PVCs (CSI snapshots) - storage foundation
# 2. Foundation resources (Secrets, ConfigMaps, NADs)
# 3. Infrastructure CRs (OpenStackVersion, MariaDBAccount, etc.)
# 4. OpenStackControlPlane (with infrastructure-only staging)
# 5. GaleraBackup CRs (backup configuration)
# 6. Wait for infrastructure (Galera, OVN, RabbitMQ) to be ready
# 7. Database restore (create GaleraRestore CRs, exec restore)
# 8. RabbitMQ credential restore (restore old secrets to temp ns, copy, create RabbitMQUser CRs)
# 9. Resume full deployment (remove staging annotation)
# 10. DataPlane resources (optional)
#
# Prerequisites:
# - OADP operator installed and configured
# - Backups exist (created with backup-openstack.yaml)
# - Target namespace is clean (run cleanup first if needed)
#
# Usage:
#   ansible-playbook docs/dev/backup-restore/restore/restore-openstack.yaml \
#     -e backup_timestamp=20260311-081234
#
#   # Skip all confirmation prompts (non-interactive):
#   ansible-playbook docs/dev/backup-restore/restore/restore-openstack.yaml \
#     -e backup_timestamp=20260311-081234 \
#     -e auto_ack=true
#
#   # Data Mover restore with WaitForFirstConsumer storage (LVM):
#   ansible-playbook docs/dev/backup-restore/restore/restore-openstack.yaml \
#     -e backup_timestamp=20260311-081234 \
#     -e pin_pvcs=true
#
# Variables:
#   openstack_namespace: Target namespace (default: openstack)
#   oadp_namespace: OADP namespace (default: openshift-adp)
#   backup_timestamp: Backup timestamp suffix (e.g., 20260311-081234). REQUIRED.
#     Used to derive backup names and passed to the Galera restore script.
#   restore_timeout: Timeout in seconds for each restore step (default: 900)
#   infra_ready_timeout: Timeout waiting for infrastructure (default: 20m)
#   ctlplane_ready_timeout: Timeout waiting for full control plane (default: 10m)
#   strict_restore: Fail on PartiallyFailed restores (default: true)
#   rabbitmq_clusters: List of RabbitMQ cluster names (default: [rabbitmq, rabbitmq-cell1])
#   auto_ack: Skip all confirmation prompts between steps (default: false)
#   pin_pvcs: Create dummy Deployments to pin PVCs to their original nodes during
#     Data Mover restores with WaitForFirstConsumer storage (e.g., LVM).
#     Extracts PVC-to-node mapping from PV nodeAffinity in the backup.
#     Not required on OCP 4.20+ (Velero v1.16+ supports ignoreDelayBinding).
#     (default: false)

- name: OpenStack Full Restore
  hosts: localhost
  gather_facts: false

  vars:
    openstack_namespace: openstack
    oadp_namespace: openshift-adp
    restore_timeout: 900
    infra_ready_timeout: 20m
    ctlplane_ready_timeout: 10m
    strict_restore: true
    rabbitmq_clusters:
    - rabbitmq
    - rabbitmq-cell1
    auto_ack: false
    pin_pvcs: false

  tasks:
    - name: Validate required parameters
      ansible.builtin.fail:
        msg: |
          Required parameter missing. Usage:
            ansible-playbook restore-openstack.yaml \
              -e backup_timestamp=YYYYMMDD-HHMMSS

          List available backups:
            oc get backup -n {{ oadp_namespace }}
      when: backup_timestamp is not defined

    - name: Derive backup names from timestamp
      ansible.builtin.set_fact:
        pvc_backup_name: "openstack-backup-pvcs-{{ backup_timestamp }}"
        resources_backup_name: "openstack-backup-resources-{{ backup_timestamp }}"

    - name: Set restore timestamp
      ansible.builtin.set_fact:
        restore_suffix: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

    - name: Create temp directory for rendered templates
      ansible.builtin.tempfile:
        state: directory
        prefix: openstack-restore-
      register: rendered_dir

    # ========================================
    # Pre-flight checks
    # ========================================
    - name: Verify OADP operator is installed
      ansible.builtin.shell: |
        oc get crd backups.velero.io -o name
      register: oadp_crd_check
      changed_when: false
      failed_when: false

    - name: Fail if OADP is not installed
      ansible.builtin.fail:
        msg: |
          OADP operator is not installed (Velero Backup CRD not found).
          Install OADP first - see docs/dev/backup-restore/setup-oadp-minio.md
      when: oadp_crd_check.rc != 0

    - name: Ensure target namespace exists
      ansible.builtin.shell: |
        oc create namespace {{ openstack_namespace }} --dry-run=client -o yaml | oc apply -f -
      changed_when: true

    - name: Verify OADP backups exist
      ansible.builtin.shell: |
        oc get backup {{ pvc_backup_name }} -n {{ oadp_namespace }} -o jsonpath='{.status.phase}'
      register: pvc_backup_phase
      changed_when: false

    - name: Verify resources backup exists
      ansible.builtin.shell: |
        oc get backup {{ resources_backup_name }} -n {{ oadp_namespace }} -o jsonpath='{.status.phase}'
      register: resources_backup_phase
      changed_when: false

    - name: Fail if backups are not completed
      ansible.builtin.fail:
        msg: |
          Backups must be in Completed phase.
          PVC backup ({{ pvc_backup_name }}): {{ pvc_backup_phase.stdout }}
          Resources backup ({{ resources_backup_name }}): {{ resources_backup_phase.stdout }}
      when: pvc_backup_phase.stdout != "Completed" or resources_backup_phase.stdout != "Completed"

    - name: Print pre-flight results
      ansible.builtin.debug:
        msg:
          - "PVC backup: {{ pvc_backup_name }} ({{ pvc_backup_phase.stdout }})"
          - "Resources backup: {{ resources_backup_name }} ({{ resources_backup_phase.stdout }})"

    # ========================================
    # Create resource modifier ConfigMap
    # ========================================
    - name: Render resource modifier ConfigMap
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/00-resource-modifiers-configmap.yaml.j2"
        dest: "{{ rendered_dir.path }}/00-resource-modifiers-configmap.yaml"

    - name: "Next: Create resource modifier ConfigMap"
      ansible.builtin.debug:
        msg: "{{ lookup('file', rendered_dir.path + '/00-resource-modifiers-configmap.yaml').splitlines() }}"
      when: not (auto_ack | bool)

    - name: Pause before creating resource modifier ConfigMap
      ansible.builtin.pause:
        prompt: >-
          Press Enter to create the resource modifier ConfigMap, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool)

    - name: Create resource modifier ConfigMap
      ansible.builtin.shell: |
        oc apply -f {{ rendered_dir.path }}/00-resource-modifiers-configmap.yaml
      changed_when: true

    # ========================================
    # Step 0.5: Pin PVCs to nodes (Data Mover + WaitForFirstConsumer only)
    # ========================================
    - name: "Step 0.5: Pin PVCs to original nodes"
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "Step 0.5: Pin PVCs to Original Nodes"
          - "========================================"
          - "Downloading backup metadata to extract PVC-to-node mapping"
          - "from PV nodeAffinity, then creating dummy pods with nodeName"
      when: pin_pvcs | bool

    - name: Download backup metadata
      ansible.builtin.shell: |
        set -e
        TMPDIR=$(mktemp -d)
        REMOTE_FILE="/tmp/backup-$$.tar.gz"
        VELERO_POD=$(oc get pods -n {{ oadp_namespace }} -l deploy=velero --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
        oc exec -n {{ oadp_namespace }} ${VELERO_POD} -- rm -f ${REMOTE_FILE} >&2 || true
        oc exec -n {{ oadp_namespace }} ${VELERO_POD} -- \
          /velero backup download {{ pvc_backup_name }} --insecure-skip-tls-verify -o ${REMOTE_FILE} >&2
        oc exec -n {{ oadp_namespace }} ${VELERO_POD} -- cat ${REMOTE_FILE} > ${TMPDIR}/backup.tar.gz
        oc exec -n {{ oadp_namespace }} ${VELERO_POD} -- rm -f ${REMOTE_FILE} >&2
        mkdir -p ${TMPDIR}/backup
        tar xzf ${TMPDIR}/backup.tar.gz -C ${TMPDIR}/backup
        echo ${TMPDIR}
      register: backup_download
      changed_when: false
      when: pin_pvcs | bool

    - name: Extract PVC-to-node mapping from PV nodeAffinity
      ansible.builtin.shell: |
        BACKUP_DIR="{{ backup_download.stdout }}/backup"
        PV_DIR="${BACKUP_DIR}/resources/persistentvolumes/cluster"
        if [ ! -d "${PV_DIR}" ]; then
          echo "WARNING: No PV resources found in backup" >&2
          exit 0
        fi
        for f in ${PV_DIR}/*.json; do
          pvc=$(jq -r '.spec.claimRef.name // empty' "$f")
          ns=$(jq -r '.spec.claimRef.namespace // empty' "$f")
          node=$(jq -r '
            .spec.nodeAffinity.required.nodeSelectorTerms[0].matchExpressions[]
            | select(.key | contains("topolvm")) | .values[0]
          ' "$f" 2>/dev/null)
          [ -n "$pvc" ] && [ -n "$node" ] && [ "$ns" = "{{ openstack_namespace }}" ] && echo "${pvc}:${node}"
        done
      register: pvc_node_mapping
      changed_when: false
      when: pin_pvcs | bool

    - name: Print PVC-to-node mapping
      ansible.builtin.debug:
        msg: "{{ pvc_node_mapping.stdout_lines }}"
      when: pin_pvcs | bool and pvc_node_mapping.stdout != ""

    - name: Create dummy Deployments to pin PVCs to nodes
      ansible.builtin.shell: |
        PVC_NAME="{{ item.split(':')[0] }}"
        NODE_NAME="{{ item.split(':')[1] }}"
        cat <<EOF | oc apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: pvc-pin-${PVC_NAME}
          namespace: {{ openstack_namespace }}
          labels:
            app: pvc-pin
        spec:
          replicas: 1
          strategy:
            type: Recreate
          selector:
            matchLabels:
              app: pvc-pin
              pvc: ${PVC_NAME}
          template:
            metadata:
              labels:
                app: pvc-pin
                pvc: ${PVC_NAME}
            spec:
              nodeSelector:
                kubernetes.io/hostname: ${NODE_NAME}
              containers:
              - name: pause
                image: registry.k8s.io/pause:3.9
                volumeMounts:
                - name: data
                  mountPath: /data
              volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: ${PVC_NAME}
        EOF
        echo "Created pvc-pin-${PVC_NAME} on ${NODE_NAME}"
      loop: "{{ pvc_node_mapping.stdout_lines }}"
      changed_when: true
      when: pin_pvcs | bool and pvc_node_mapping.stdout != ""

    - name: Clean up downloaded backup metadata
      ansible.builtin.file:
        path: "{{ backup_download.stdout }}"
        state: absent
      when: pin_pvcs | bool

    # ========================================
    # Step 1: Restore PVCs (Order 00)
    # ========================================
    - name: Render PVC restore
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/01-restore-order-00-pvcs.yaml.j2"
        dest: "{{ rendered_dir.path }}/01-restore-order-00-pvcs.yaml"

    - name: "Next: Step 1 - Restore PVCs (CSI Snapshots)"
      ansible.builtin.debug:
        msg: "{{ lookup('file', rendered_dir.path + '/01-restore-order-00-pvcs.yaml').splitlines() }}"
      when: not (auto_ack | bool)

    - name: Pause before PVC restore
      ansible.builtin.pause:
        prompt: >-
          Pre-flight checks passed.
          Press Enter to continue, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool)

    - name: Create PVC restore
      ansible.builtin.shell: |
        oc apply -f {{ rendered_dir.path }}/01-restore-order-00-pvcs.yaml
      changed_when: true

    - name: Wait for PVC restore
      ansible.builtin.include_tasks:
        file: wait-for-restore.yaml
      vars:
        restore_name: "openstack-restore-00-pvcs-{{ restore_suffix }}"
        step_name: "Step 1 (PVC restore)"

    - name: Delete dummy Deployments after PVC restore
      ansible.builtin.shell: |
        oc delete deployment -n {{ openstack_namespace }} -l app=pvc-pin --ignore-not-found=true
      changed_when: true
      when: pin_pvcs | bool

    - name: Show PVC status after restore
      ansible.builtin.shell: |
        oc get pvc -n {{ openstack_namespace }}
      register: pvc_status
      changed_when: false

    - name: Print PVC status
      ansible.builtin.debug:
        msg: "{{ pvc_status.stdout_lines }}"

    # ========================================
    # Step 2: Restore Foundation (Order 10)
    # ========================================
    - name: Render foundation restore
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/02-restore-order-10-foundation.yaml.j2"
        dest: "{{ rendered_dir.path }}/02-restore-order-10-foundation.yaml"

    - name: "Next: Step 2 - Restore foundation resources (Secrets, ConfigMaps, NADs)"
      ansible.builtin.debug:
        msg: "{{ lookup('file', rendered_dir.path + '/02-restore-order-10-foundation.yaml').splitlines() }}"
      when: not (auto_ack | bool)

    - name: Pause after PVC restore
      ansible.builtin.pause:
        prompt: >-
          Step 1 complete: PVC restore. Verify PVCs are Bound above.
          Press Enter to continue, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool)

    - name: Create foundation restore
      ansible.builtin.shell: |
        oc apply -f {{ rendered_dir.path }}/02-restore-order-10-foundation.yaml
      changed_when: true

    - name: Wait for foundation restore
      ansible.builtin.include_tasks:
        file: wait-for-restore.yaml
      vars:
        restore_name: "openstack-restore-10-foundation-{{ restore_suffix }}"
        step_name: "Step 2 (Foundation restore)"

    # ========================================
    # Step 3: Restore Infrastructure (Order 20)
    # ========================================
    - name: Render infrastructure restore
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/03-restore-order-20-infrastructure.yaml.j2"
        dest: "{{ rendered_dir.path }}/03-restore-order-20-infrastructure.yaml"

    - name: "Next: Step 3 - Restore infrastructure CRs (OpenStackVersion, MariaDBAccount, etc.)"
      ansible.builtin.debug:
        msg: "{{ lookup('file', rendered_dir.path + '/03-restore-order-20-infrastructure.yaml').splitlines() }}"
      when: not (auto_ack | bool)

    - name: Pause after foundation restore
      ansible.builtin.pause:
        prompt: >-
          Step 2 complete: Foundation resources restored.
          Press Enter to continue, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool)

    - name: Create infrastructure restore
      ansible.builtin.shell: |
        oc apply -f {{ rendered_dir.path }}/03-restore-order-20-infrastructure.yaml
      changed_when: true

    - name: Wait for infrastructure restore
      ansible.builtin.include_tasks:
        file: wait-for-restore.yaml
      vars:
        restore_name: "openstack-restore-20-infra-{{ restore_suffix }}"
        step_name: "Step 3 (Infrastructure restore)"

    # ========================================
    # Step 4: Restore ControlPlane (Order 30)
    # ========================================
    - name: Render controlplane restore
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/04-restore-order-30-controlplane.yaml.j2"
        dest: "{{ rendered_dir.path }}/04-restore-order-30-controlplane.yaml"

    - name: "Next: Step 4 - Restore OpenStackControlPlane (staged, infrastructure-only)"
      ansible.builtin.debug:
        msg: "{{ lookup('file', rendered_dir.path + '/04-restore-order-30-controlplane.yaml').splitlines() }}"
      when: not (auto_ack | bool)

    - name: Pause after infrastructure restore
      ansible.builtin.pause:
        prompt: >-
          Step 3 complete: Infrastructure CRs restored.
          Press Enter to continue, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool)

    - name: Create controlplane restore
      ansible.builtin.shell: |
        oc apply -f {{ rendered_dir.path }}/04-restore-order-30-controlplane.yaml
      changed_when: true

    - name: Wait for controlplane restore
      ansible.builtin.include_tasks:
        file: wait-for-restore.yaml
      vars:
        restore_name: "openstack-restore-30-ctlplane-{{ restore_suffix }}"
        step_name: "Step 4 (ControlPlane restore)"

    # ========================================
    # Step 5: Restore GaleraBackup CRs (Order 40)
    # ========================================
    - name: Render backup config restore
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/05-restore-order-40-backup-config.yaml.j2"
        dest: "{{ rendered_dir.path }}/05-restore-order-40-backup-config.yaml"

    - name: "Next: Step 5 - Restore GaleraBackup CRs"
      ansible.builtin.debug:
        msg: "{{ lookup('file', rendered_dir.path + '/05-restore-order-40-backup-config.yaml').splitlines() }}"
      when: not (auto_ack | bool)

    - name: Pause after controlplane restore
      ansible.builtin.pause:
        prompt: >-
          Step 4 complete: OpenStackControlPlane restored (staged).
          Press Enter to continue, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool)

    - name: Create backup config restore
      ansible.builtin.shell: |
        oc apply -f {{ rendered_dir.path }}/05-restore-order-40-backup-config.yaml
      changed_when: true

    - name: Wait for backup config restore
      ansible.builtin.include_tasks:
        file: wait-for-restore.yaml
      vars:
        restore_name: "openstack-restore-40-backup-{{ restore_suffix }}"
        step_name: "Step 5 (GaleraBackup restore)"

    # ========================================
    # Step 6: Wait for Infrastructure Ready
    # ========================================
    - name: Pause after GaleraBackup restore
      ansible.builtin.pause:
        prompt: >-
          Step 5 complete: GaleraBackup CRs restored.
          Next: Step 6 - Wait for infrastructure ready (Galera, OVN, RabbitMQ, Memcached).
          Press Enter to continue, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool)

    - name: Wait for OpenStackControlPlane infrastructure ready
      ansible.builtin.shell: |
        oc wait openstackcontrolplane -n {{ openstack_namespace }} --all \
          --for=condition=OpenStackControlPlaneInfrastructureReady \
          --timeout={{ infra_ready_timeout }}
      changed_when: false

    - name: Get OpenStackControlPlane name
      ansible.builtin.shell: |
        oc get openstackcontrolplane -n {{ openstack_namespace }} -o jsonpath='{.items[0].metadata.name}'
      register: ctlplane_name
      changed_when: false

    - name: Verify Galera pods are running
      ansible.builtin.shell: |
        oc get pods -n {{ openstack_namespace }} -l app=galera -o jsonpath='{.items[*].status.phase}' | tr ' ' '\n' | sort -u
      register: galera_pod_phases
      changed_when: false

    - name: Print Step 6 result
      ansible.builtin.debug:
        msg:
          - "Infrastructure is ready"
          - "ControlPlane: {{ ctlplane_name.stdout }}"
          - "Galera pod phases: {{ galera_pod_phases.stdout }}"

    # ========================================
    # Step 7: Database Restore
    # ========================================
    - name: Pause after infrastructure ready
      ansible.builtin.pause:
        prompt: >-
          Step 6 complete: Infrastructure is ready (Galera, OVN, RabbitMQ, Memcached).
          Next: Step 7 - Database restore (GaleraRestore).
          Press Enter to continue, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool)

    - name: Get GaleraBackup names
      ansible.builtin.shell: |
        oc get galerabackup -n {{ openstack_namespace }} -o jsonpath='{.items[*].metadata.name}'
      register: galerabackup_names
      changed_when: false

    - name: Print GaleraBackup CRs found
      ansible.builtin.debug:
        msg: "GaleraBackup CRs: {{ galerabackup_names.stdout.split() if galerabackup_names.stdout != '' else 'none' }}"

    - name: Create GaleraRestore CRs
      ansible.builtin.shell: |
        BACKUP_NAME="{{ item }}"
        RESTORE_NAME="${BACKUP_NAME}restore"
        cat <<EOF | oc apply -f -
        apiVersion: mariadb.openstack.org/v1beta1
        kind: GaleraRestore
        metadata:
          name: ${RESTORE_NAME}
          namespace: {{ openstack_namespace }}
        spec:
          backupSource: ${BACKUP_NAME}
        EOF
        echo ${RESTORE_NAME}
      loop: "{{ galerabackup_names.stdout.split() }}"
      register: galerarestore_names
      changed_when: true
      when: galerabackup_names.stdout != ""

    - name: Wait for GaleraRestore pods to be ready
      ansible.builtin.shell: |
        RESTORE_NAME="{{ item.stdout_lines[-1] }}"
        BACKUP_SOURCE=$(oc get galerarestore ${RESTORE_NAME} -n {{ openstack_namespace }} \
          -o jsonpath='{.spec.backupSource}')
        POD_NAME="${BACKUP_SOURCE}-restore-${RESTORE_NAME}"
        oc wait --for=condition=Ready pod/${POD_NAME} -n {{ openstack_namespace }} --timeout=120s
      loop: "{{ galerarestore_names.results }}"
      changed_when: false
      when: galerabackup_names.stdout != ""

    - name: Execute database restore for each GaleraRestore
      ansible.builtin.shell: |
        RESTORE_NAME="{{ item.stdout_lines[-1] }}"
        {{ playbook_dir }}/../scripts/restore-galera.sh ${RESTORE_NAME} {{ backup_timestamp }} {{ openstack_namespace }}
      loop: "{{ galerarestore_names.results }}"
      changed_when: true
      when: galerabackup_names.stdout != ""

    - name: Print Step 7 result
      ansible.builtin.debug:
        msg: "Database restore completed"
      when: galerabackup_names.stdout != ""

    - name: Print Step 7 skip
      ansible.builtin.debug:
        msg: "No GaleraBackup CRs found - skipping database restore"
      when: galerabackup_names.stdout == ""

    # ========================================
    # Step 8: Restore RabbitMQ Credentials
    # ========================================
    - name: Render resource modifier for temp namespace
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/06b-resource-modifiers-tmp.yaml.j2"
        dest: "{{ rendered_dir.path }}/06b-resource-modifiers-tmp.yaml"

    - name: Render RabbitMQ secret restore
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/06b-restore-rabbitmq-secrets.yaml.j2"
        dest: "{{ rendered_dir.path }}/06b-restore-rabbitmq-secrets.yaml"

    - name: "Next: Step 8 - Restore RabbitMQ user credentials"
      ansible.builtin.debug:
        msg:
          - "{{ lookup('file', rendered_dir.path + '/06b-resource-modifiers-tmp.yaml').splitlines() }}"
          - "---"
          - "{{ lookup('file', rendered_dir.path + '/06b-restore-rabbitmq-secrets.yaml').splitlines() }}"
      when: not (auto_ack | bool)

    - name: Pause after database restore
      ansible.builtin.pause:
        prompt: >-
          Step 7 complete: Database restore.
          Press Enter to continue, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool)

    - name: Delete temp namespace if it exists from a previous run
      ansible.builtin.shell: |
        if oc get namespace openstack-restore-tmp &>/dev/null; then
          # Remove finalizers from all secrets to unblock namespace deletion
          for SECRET in $(oc get secret -n openstack-restore-tmp -o name 2>/dev/null); do
            oc patch ${SECRET} -n openstack-restore-tmp --type=merge -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
          done
          oc delete namespace openstack-restore-tmp --wait=true --timeout=60s
        fi
      changed_when: true

    - name: Create temp namespace for RabbitMQ secret restore
      ansible.builtin.shell: |
        oc create namespace openstack-restore-tmp
      changed_when: true

    - name: Create resource modifier to strip finalizers for temp restore
      ansible.builtin.shell: |
        oc apply -f {{ rendered_dir.path }}/06b-resource-modifiers-tmp.yaml
      changed_when: true

    - name: Restore secrets from backup to temp namespace
      ansible.builtin.shell: |
        oc apply -f {{ rendered_dir.path }}/06b-restore-rabbitmq-secrets.yaml
      changed_when: true

    - name: Wait for RabbitMQ secret restore
      ansible.builtin.include_tasks:
        file: wait-for-restore.yaml
      vars:
        restore_name: "openstack-restore-rabbitmq-secrets-{{ restore_suffix }}"
        step_name: "Step 8 (RabbitMQ secret restore)"

    - name: Copy default-user secrets to restored-user in target namespace
      ansible.builtin.shell: |
        CLUSTER_NAME="{{ item }}"
        SOURCE_SECRET="${CLUSTER_NAME}-default-user"
        TARGET_SECRET="${CLUSTER_NAME}-restored-user"

        if ! oc get secret "${SOURCE_SECRET}" -n openstack-restore-tmp &>/dev/null; then
          echo "WARNING: Secret ${SOURCE_SECRET} not found in temp namespace - skipping"
          exit 0
        fi

        # Extract secret data and create a standalone copy in target namespace
        TMPDIR=$(mktemp -d)
        oc extract secret/${SOURCE_SECRET} -n openstack-restore-tmp --to=${TMPDIR} --confirm
        oc create secret generic ${TARGET_SECRET} -n {{ openstack_namespace }} --from-file=${TMPDIR}
        rm -rf ${TMPDIR}
        echo "Created ${TARGET_SECRET} in {{ openstack_namespace }}"
      loop: "{{ rabbitmq_clusters }}"
      changed_when: true

    - name: Delete temp namespace
      ansible.builtin.shell: |
        oc delete namespace openstack-restore-tmp --wait=false
      changed_when: true

    - name: Create RabbitMQUser CRs for restored credentials
      ansible.builtin.shell: |
        CLUSTER_NAME="{{ item }}"
        RESTORED_SECRET_NAME="${CLUSTER_NAME}-restored-user"

        if ! oc get secret "${RESTORED_SECRET_NAME}" -n {{ openstack_namespace }} &>/dev/null; then
          echo "WARNING: Secret ${RESTORED_SECRET_NAME} not found - skipping"
          exit 0
        fi

        cat <<EOF | oc apply -f -
        apiVersion: rabbitmq.openstack.org/v1beta1
        kind: RabbitMQUser
        metadata:
          name: ${CLUSTER_NAME}-restored-user
          namespace: {{ openstack_namespace }}
        spec:
          rabbitmqClusterName: ${CLUSTER_NAME}
          secret: ${RESTORED_SECRET_NAME}
          tags:
            - administrator
          permissions:
            configure: ".*"
            read: ".*"
            write: ".*"
        EOF
        echo "Created RabbitMQUser CR for ${CLUSTER_NAME}"
      loop: "{{ rabbitmq_clusters }}"
      changed_when: true

    - name: Print Step 8 result
      ansible.builtin.debug:
        msg: "RabbitMQ user credentials restored"

    # ========================================
    # Step 9: Resume Full Deployment
    # ========================================
    - name: Pause after RabbitMQ restore
      ansible.builtin.pause:
        prompt: >-
          Step 8 complete: RabbitMQ user credentials restored.
          Next: Step 9 - Resume full deployment (remove staging annotation).
          Press Enter to continue, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool)

    - name: Remove deployment-stage annotation
      ansible.builtin.shell: |
        oc annotate openstackcontrolplane {{ ctlplane_name.stdout }} \
          -n {{ openstack_namespace }} core.openstack.org/deployment-stage-
      changed_when: true

    - name: Wait for OpenStackControlPlane to be ready
      ansible.builtin.shell: |
        oc wait openstackcontrolplane {{ ctlplane_name.stdout }} \
          -n {{ openstack_namespace }} \
          --for=condition=Ready \
          --timeout={{ ctlplane_ready_timeout }}
      changed_when: false

    - name: Print Step 9 result
      ansible.builtin.debug:
        msg: "Full control plane deployment is ready"

    # ========================================
    # Step 10: Restore DataPlane (Order 60)
    # ========================================
    - name: Render dataplane restore
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/07-restore-order-60-dataplane.yaml.j2"
        dest: "{{ rendered_dir.path }}/07-restore-order-60-dataplane.yaml"

    - name: "Next: Step 10 - Restore DataPlane resources"
      ansible.builtin.debug:
        msg: "{{ lookup('file', rendered_dir.path + '/07-restore-order-60-dataplane.yaml').splitlines() }}"
      when: not (auto_ack | bool)

    - name: Pause after full deployment ready
      ansible.builtin.pause:
        prompt: >-
          Step 9 complete: Full control plane deployment is ready.
          Press Enter to continue, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool)

    - name: Create dataplane restore
      ansible.builtin.shell: |
        oc apply -f {{ rendered_dir.path }}/07-restore-order-60-dataplane.yaml
      changed_when: true

    - name: Wait for dataplane restore
      ansible.builtin.include_tasks:
        file: wait-for-restore.yaml
      vars:
        restore_name: "openstack-restore-60-dataplane-{{ restore_suffix }}"
        step_name: "Step 10 (DataPlane restore)"

    # ========================================
    # Step 11: EDPM Deployment (resync credentials)
    # ========================================
    - name: Get DataPlaneNodeSet names
      ansible.builtin.shell: |
        oc get openstackdataplanenodeset -n {{ openstack_namespace }} -o jsonpath='{.items[*].metadata.name}'
      register: nodeset_names
      changed_when: false

    - name: Set nodeset list
      ansible.builtin.set_fact:
        nodeset_names_list: "{{ nodeset_names.stdout.split() }}"
      when: nodeset_names.stdout != ""

    - name: Render EDPM deployment CR
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/08-edpm-deployment.yaml.j2"
        dest: "{{ rendered_dir.path }}/08-edpm-deployment.yaml"
      when: nodeset_names.stdout != ""

    - name: "Next: Step 11 - Run EDPM deployment to resync credentials on dataplane nodes"
      ansible.builtin.debug:
        msg: "{{ lookup('file', rendered_dir.path + '/08-edpm-deployment.yaml').splitlines() }}"
      when: not (auto_ack | bool) and nodeset_names.stdout != ""

    - name: Pause before EDPM deployment
      ansible.builtin.pause:
        prompt: >-
          Step 10 complete: DataPlane resources restored.
          Next: Step 11 - Run EDPM deployment to resync credentials.
          Press Enter to continue, or Ctrl+C then 'A' to abort
      when: not (auto_ack | bool) and nodeset_names.stdout != ""

    - name: Create EDPM deployment
      ansible.builtin.shell: |
        oc apply -f {{ rendered_dir.path }}/08-edpm-deployment.yaml
      changed_when: true
      when: nodeset_names.stdout != ""

    - name: Print EDPM deployment status
      ansible.builtin.debug:
        msg:
          - "Created OpenStackDataPlaneDeployment: edpm-deployment-post-restore-{{ restore_suffix }}"
          - ""
          - "Monitor deployment progress with:"
          - "  oc get openstackdataplanedeployment -n {{ openstack_namespace }}"
          - "  oc get openstackdataplanenodeset -n {{ openstack_namespace }}"
      when: nodeset_names.stdout != ""

    - name: Print EDPM deployment skip
      ansible.builtin.debug:
        msg: "No DataPlaneNodeSets found - skipping EDPM deployment"
      when: nodeset_names.stdout == ""

    - name: Clean up rendered templates
      ansible.builtin.file:
        path: "{{ rendered_dir.path }}"
        state: absent

    # ========================================
    # Summary
    # ========================================
    - name: Print restore summary
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "Restore Complete"
          - "========================================"
          - ""
          - "ControlPlane: {{ ctlplane_name.stdout }}"
          - "Restore suffix: {{ restore_suffix }}"
          - ""
          - "IMPORTANT: Post-restore step required:"
          - ""
          - "Re-enable InstanceHa (restored with spec.disabled=True):"
          - "  oc patch instanceha <name> -n {{ openstack_namespace }} --type merge -p '{\"spec\":{\"disabled\":\"False\"}}'"
          - ""
          - "To verify:"
          - "  oc get openstackcontrolplane -n {{ openstack_namespace }}"
          - "  oc get pods -n {{ openstack_namespace }}"
          - "  oc get restore -n {{ oadp_namespace }} | grep {{ restore_suffix }}"
