---
# Restore Order 60: DataPlane Resources
# Restores OpenStackDataPlaneNodeSet and related dataplane resources
# Must be restored after ControlPlane is fully operational (after order 50 manual steps)
#
# Prerequisite: Create the resource modifier ConfigMap first:
#   oc apply -f 00-resource-modifiers-configmap.yaml
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: openstack-restore-60-dataplane
  namespace: openshift-adp
spec:
  backupName: openstack-backup-resources

  # Restore to the same namespace
  includedNamespaces:
  - openstack

  # Only restore resources with backup-restore label and order 60
  labelSelector:
    matchLabels:
      backup.openstack.org/restore: "true"
      backup.openstack.org/restore-order: "60"

  # Remove last-applied-configuration via ConfigMap-based resource modifiers
  resourceModifier:
    kind: ConfigMap
    name: openstack-restore-resource-modifiers
