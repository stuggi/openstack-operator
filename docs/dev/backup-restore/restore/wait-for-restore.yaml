---
# Reusable task to wait for a Velero Restore to complete.
# Handles Completed, PartiallyFailed, and Failed phases.
#
# Required variables:
#   restore_name: Name of the Velero Restore CR
#   step_name: Human-readable step name for log messages
#
# Optional variables:
#   oadp_namespace: OADP namespace (default: openshift-adp)
#   restore_timeout: Timeout in seconds (default: 900)
#   strict_restore: Fail on PartiallyFailed (default: true)

- name: "{{ step_name }}: Poll restore phase"
  ansible.builtin.shell: |
    oc get restore {{ restore_name }} -n {{ oadp_namespace | default('openshift-adp') }} \
      -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound"
  register: restore_phase
  changed_when: false
  until: restore_phase.stdout in ["Completed", "PartiallyFailed", "Failed", "FailedValidation"]
  retries: "{{ ((restore_timeout | default(900)) | int / 10) | int }}"
  delay: 10

- name: "{{ step_name }}: Get restore details on non-Completed phase"
  ansible.builtin.shell: |
    echo "=== Restore Status ==="
    oc get restore {{ restore_name }} -n {{ oadp_namespace | default('openshift-adp') }} \
      -o jsonpath='{.status}' | python3 -m json.tool 2>/dev/null || \
    oc get restore {{ restore_name }} -n {{ oadp_namespace | default('openshift-adp') }} \
      -o yaml
    echo ""
    echo "=== Velero Restore Describe ==="
    oc -n {{ oadp_namespace | default('openshift-adp') }} exec deployment/velero -- \
      ./velero restore describe {{ restore_name }} --details 2>/dev/null || true
    echo ""
    echo "=== Velero Restore Logs ==="
    oc -n {{ oadp_namespace | default('openshift-adp') }} exec deployment/velero -- \
      ./velero restore logs {{ restore_name }} 2>/dev/null | tail -50 || true
  register: restore_details
  changed_when: false
  when: restore_phase.stdout != "Completed"

- name: "{{ step_name }}: Print restore diagnostics"
  ansible.builtin.debug:
    msg: "{{ restore_details.stdout_lines }}"
  when: restore_phase.stdout != "Completed"

- name: "{{ step_name }}: Fail on Failed restore"
  ansible.builtin.fail:
    msg: |
      Restore {{ restore_name }} {{ restore_phase.stdout }}.

      Debug commands:
        oc describe restore {{ restore_name }} -n {{ oadp_namespace | default('openshift-adp') }}
        oc -n {{ oadp_namespace | default('openshift-adp') }} exec deployment/velero -- ./velero restore describe {{ restore_name }} --details
        oc -n {{ oadp_namespace | default('openshift-adp') }} exec deployment/velero -- ./velero restore logs {{ restore_name }}
  when: restore_phase.stdout in ["Failed", "FailedValidation"]

- name: "{{ step_name }}: Fail on PartiallyFailed restore (strict mode)"
  ansible.builtin.fail:
    msg: |
      Restore {{ restore_name }} {{ restore_phase.stdout }}.

      To continue despite partial failures, re-run with:
        -e strict_restore=false

      Debug commands:
        oc describe restore {{ restore_name }} -n {{ oadp_namespace | default('openshift-adp') }}
        oc -n {{ oadp_namespace | default('openshift-adp') }} exec deployment/velero -- ./velero restore describe {{ restore_name }} --details
        oc -n {{ oadp_namespace | default('openshift-adp') }} exec deployment/velero -- ./velero restore logs {{ restore_name }}
  when: restore_phase.stdout == "PartiallyFailed" and (strict_restore | default(true) | bool)

- name: "{{ step_name }}: Warn on PartiallyFailed restore (non-strict mode)"
  ansible.builtin.debug:
    msg:
      - "WARNING: Restore {{ restore_name }} completed with status: {{ restore_phase.stdout }}"
      - "strict_restore=false - continuing despite partial failure."
      - ""
      - "To investigate:"
      - "  oc describe restore {{ restore_name }} -n {{ oadp_namespace | default('openshift-adp') }}"
      - "  oc -n {{ oadp_namespace | default('openshift-adp') }} exec deployment/velero -- ./velero restore logs {{ restore_name }}"
  when: restore_phase.stdout == "PartiallyFailed" and not (strict_restore | default(true) | bool)

- name: "{{ step_name }}: List restored resources"
  ansible.builtin.shell: |
    oc get all,pvc,secret,configmap,net-attach-def \
      -n {{ openstack_namespace | default('openstack') }} \
      -l velero.io/restore-name={{ restore_name }} \
      --no-headers 2>/dev/null || true
  register: restored_resources
  changed_when: false
  when: restore_phase.stdout in ["Completed", "PartiallyFailed"]

- name: "{{ step_name }}: Print restored resources"
  ansible.builtin.debug:
    msg: "{{ restored_resources.stdout_lines }}"
  when: restore_phase.stdout in ["Completed", "PartiallyFailed"] and restored_resources.stdout != ""

- name: "{{ step_name }}: Print success"
  ansible.builtin.debug:
    msg: "Restore {{ restore_name }} completed successfully"
  when: restore_phase.stdout == "Completed"
