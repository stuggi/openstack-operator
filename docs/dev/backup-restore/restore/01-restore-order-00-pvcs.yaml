---
# Restore Order 00: Storage Foundation - PVCs
# Restores all PVCs (Glance image storage, GaleraBackup PVCs)
# Must be restored first before other resources
#
# Note: No labelSelector needed - the backup (openstack-backup-pvcs) already
# filtered to only include PVCs with backup.openstack.org/backup=true label.
#
# Prerequisite: Create the resource modifier ConfigMap first:
#   oc apply -f 00-resource-modifiers-configmap.yaml
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: openstack-restore-00-pvcs
  namespace: openshift-adp
spec:
  backupName: openstack-backup-pvcs

  # Restore to the same namespace
  includedNamespaces:
  - openstack

  # Exclude pods - Velero includes them as related items for PVCs,
  # but they fail to restore (missing ServiceAccounts) and aren't needed
  excludedResources:
  - pods

  # Resource modifiers: strip last-applied-configuration and optionally
  # change StorageClass to Immediate binding for Data Mover restores
  resourceModifier:
    kind: ConfigMap
    name: openstack-restore-resource-modifiers

  # Restore PVCs from volume snapshots (or Data Mover downloads)
  restorePVs: true
