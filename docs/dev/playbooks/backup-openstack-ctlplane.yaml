---
# OpenStack Control Plane Backup Playbook
# This playbook performs a backup of the stateless OpenStack control plane
# following the documented procedure in backup-restore-ctlplane.md
#
# IMPORTANT: Only backup fully updated environments!
#            Backup/restore is NOT supported for partially updated environments
#            (e.g., operators updated but ControlPlane minor update not completed).
#            Ensure all operators and services are at the same version before backup.
#
#            See: https://issues.redhat.com/browse/OSPRH-26244
#                 https://issues.redhat.com/browse/OSPRH-26246
#
# Usage:
#   ansible-playbook backup-openstack-ctlplane.yaml
#   ansible-playbook backup-openstack-ctlplane.yaml -e openstack_namespace=my-openstack
#   ansible-playbook backup-openstack-ctlplane.yaml -e backup_dir_base=/custom/backup/path
#   ansible-playbook backup-openstack-ctlplane.yaml -e skip_pvc_backup=true  # Skip OADP PVC backup

- name: Backup OpenStack Control Plane
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Set backup timestamp (evaluate once)
      ansible.builtin.shell: date +%Y%m%d-%H%M%S
      register: backup_date_result
      changed_when: false

    - name: Set default variables
      ansible.builtin.set_fact:
        backup_date: "{{ backup_date_result.stdout }}"
        openstack_namespace: "{{ openstack_namespace | default('openstack') }}"
        backup_dir_base_input: "{{ backup_dir_base | default('./backups') }}"
        skip_pvc_backup: "{{ skip_pvc_backup | default(false) | bool }}"
        oadp_namespace: "{{ oadp_namespace | default('openshift-adp') }}"
        pvc_backup_timeout: "{{ pvc_backup_timeout | default('60m') }}"
        galera_backup_timeout: "{{ galera_backup_timeout | default('10m') }}"

    - name: Resolve absolute backup directory path
      ansible.builtin.set_fact:
        backup_dir_base: "{{ backup_dir_base_input if backup_dir_base_input.startswith('/') else (lookup('env', 'PWD') + '/' + backup_dir_base_input) }}"

    - name: Set backup directory
      ansible.builtin.set_fact:
        backup_dir: "{{ backup_dir_base }}/openstack-ctlplane-backup-{{ backup_date }}"

    - name: Get current timestamp in ISO8601 format
      ansible.builtin.shell: date -u +"%Y-%m-%dT%H:%M:%SZ"
      register: backup_timestamp
      changed_when: false

    - name: Print backup header
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "OpenStack Control Plane Backup"
          - "========================================"
          - "Namespace: {{ openstack_namespace }}"
          - "Backup base directory: {{ backup_dir_base }}"
          - "Backup directory: {{ backup_dir }}"

    - name: Create backup directory
      ansible.builtin.shell: mkdir -p "{{ backup_dir }}"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 1 - Backup OpenStackControlPlane CR
      ansible.builtin.shell: |
        oc get openstackcontrolplane -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/openstackcontrolplane-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 1 completion
      ansible.builtin.debug:
        msg: "✓ OpenStackControlPlane CR backed up"

    - name: Step 2 - Backup OpenStackVersion
      ansible.builtin.shell: |
        oc get openstackversion -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/openstackversion-backup.json
      args:
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Step 2 - Backup Topology
      ansible.builtin.shell: |
        oc get topology -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/topology-backup.json
      args:
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Step 2 - Backup BGPConfiguration (user customization)
      ansible.builtin.shell: |
        oc get bgpconfiguration -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/bgpconfiguration-backup.json
      args:
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Step 2 - Backup DNSData without ownerReferences (user-created only)
      ansible.builtin.shell: |
        oc get dnsdata -n {{ openstack_namespace }} -o json | \
          jq '.items |= map(select(.metadata.ownerReferences == null or (.metadata.ownerReferences | length) == 0)) |
              del(.items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/dnsdata-backup.json
      args:
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Step 2 - Backup InstanceHa (user customization)
      ansible.builtin.shell: |
        oc get instanceha -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/instanceha-backup.json
      args:
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Step 2 - Backup RabbitMQUser CRs
      ansible.builtin.shell: |
        oc get rabbitmquser -n {{ openstack_namespace }} -o json 2>/dev/null | \
          jq 'del(.items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .metadata)' > {{ backup_dir }}/rabbitmquser-backup.json || \
          echo '{"apiVersion":"v1","items":[],"kind":"List"}' > {{ backup_dir }}/rabbitmquser-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 2 completion
      ansible.builtin.debug:
        msg: "✓ Related Custom Resources backed up (Topology, BGPConfiguration, DNSData [user-created only], InstanceHa, RabbitMQUser)"

    - name: Step 3 - Backup NetworkAttachmentDefinitions
      ansible.builtin.shell: |
        oc get network-attachment-definition -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/network-attachment-definitions-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 3 completion
      ansible.builtin.debug:
        msg: "✓ NetworkAttachmentDefinitions backed up"

    - name: Step 4 - Backup Secrets (excluding auto-generated)
      ansible.builtin.shell: |
        oc get secrets -n {{ openstack_namespace }} -o json | \
          jq '.items |= map(select(.type != "kubernetes.io/dockercfg" and .type != "kubernetes.io/service-account-token")) |
              del(.items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/secrets-all-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Count backed up secrets
      ansible.builtin.shell: |
        jq '.items | length' {{ backup_dir }}/secrets-all-backup.json
      register: secret_count
      changed_when: false

    - name: Print Step 4 completion
      ansible.builtin.debug:
        msg:
          - "✓ {{ secret_count.stdout }} secrets backed up (excludes auto-generated system secrets)"
          - "  Note: ownerReferences preserved for restore filtering"

    - name: Step 5 - Backup MariaDBDatabase CRs
      ansible.builtin.shell: |
        oc get mariadbdatabase -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/mariadbdatabase-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 5 - Backup MariaDBAccount CRs
      ansible.builtin.shell: |
        oc get mariadbaccount -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/mariadbaccount-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 5 - Backup GaleraBackup CRs
      ansible.builtin.shell: |
        oc get galerabackup -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .items[].status,
                  .metadata)' > {{ backup_dir }}/galerabackup-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 5 completion
      ansible.builtin.debug:
        msg: "✓ MariaDB resources backed up"

    - name: Step 6 - Backup Issuer CRs
      ansible.builtin.shell: |
        oc get issuer -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/issuer-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 6 - Backup Certificate CRs
      ansible.builtin.shell: |
        oc get certificate -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/certificates-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 6 completion
      ansible.builtin.debug:
        msg: "✓ TLS Issuers and Certificates backed up"

    - name: Step 7 - Backup ConfigMaps
      ansible.builtin.shell: |
        oc get configmaps -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/configmaps-all-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 7 completion
      ansible.builtin.debug:
        msg:
          - "✓ All ConfigMaps backed up"
          - "  Note: ownerReferences preserved for restore filtering"

    - name: Step 8 - Get cluster information
      ansible.builtin.shell: |
        oc version -o json | jq -r '.openshiftVersion'
      register: openshift_version
      changed_when: false
      failed_when: false

    - name: Step 8 - Get Kubernetes version
      ansible.builtin.shell: |
        oc version -o json | jq -r '.serverVersion.gitVersion'
      register: k8s_version
      changed_when: false
      failed_when: false

    - name: Step 8 - Get console URL
      ansible.builtin.shell: |
        oc whoami --show-console
      register: console_url
      changed_when: false
      failed_when: false

    - name: Step 8 - Get current user
      ansible.builtin.shell: |
        oc whoami
      register: current_user
      changed_when: false

    - name: Step 8 - Get global storageClass
      ansible.builtin.shell: |
        oc get openstackcontrolplane -n {{ openstack_namespace }} -o jsonpath='{.items[0].spec.storageClass}'
      register: global_storage_class
      changed_when: false
      failed_when: false

    - name: Step 8 - Get available StorageClasses
      ansible.builtin.shell: |
        oc get storageclass --no-headers | awk '{print "  - " $1}'
      register: storage_classes
      changed_when: false

    - name: Step 8 - Get CSVs
      ansible.builtin.shell: |
        oc get csv -n openstack-operators
      register: csv_list
      changed_when: false

    - name: Step 8 - Get Subscriptions
      ansible.builtin.shell: |
        oc get subscription -n openstack-operators
      register: subscription_list
      changed_when: false

    - name: Step 8 - Get InstallPlans
      ansible.builtin.shell: |
        oc get installplan -n openstack-operators
      register: installplan_list
      changed_when: false

    - name: Step 8 - Create operator-versions.txt
      ansible.builtin.shell: |
        cat > "{{ backup_dir }}/operator-versions.txt" << 'EOF'
        ========================================
        OpenStack Control Plane Backup Metadata
        ========================================
        Backup Date: {{ backup_timestamp.stdout }}
        Backup Created By: {{ current_user.stdout }}

        OpenShift Cluster Information:
        - Cluster Version: {{ openshift_version.stdout | default('N/A') }}
        - Kubernetes Version: {{ k8s_version.stdout | default('N/A') }}
        - Console URL: {{ console_url.stdout | default('N/A') }}

        Namespace: {{ openstack_namespace }}

        Installed Operators (ClusterServiceVersions):
        {{ csv_list.stdout }}

        Operator Subscriptions:
        {{ subscription_list.stdout }}

        Install Plans:
        {{ installplan_list.stdout }}

        Storage Configuration:
        Note: Services can override the global storageClass with service-specific parameters
        - Global StorageClass: {{ global_storage_class.stdout | default('N/A') }}
        - Available StorageClasses in cluster:
        {{ storage_classes.stdout }}
        EOF
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 8 - Backup CSV details
      ansible.builtin.shell: |
        oc get csv -n openstack-operators -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/csv-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 8 - Backup Subscription details
      ansible.builtin.shell: |
        oc get subscription -n openstack-operators -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/subscription-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 8 - Backup InstallPlan details
      ansible.builtin.shell: |
        oc get installplan -n openstack-operators -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/installplan-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 8 completion
      ansible.builtin.debug:
        msg: "✓ Operator versions documented"

    # Step 9: Trigger Galera Database Backups
    - name: Print Step 9 header
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "Step 9: Trigger Galera Database Backups"
          - "========================================"
          - ""
          - "Creating jobs from GaleraBackup cronjobs to dump databases to PVCs"
          - "Prerequisites: GaleraBackup CRs must be created and backup PVCs must be labeled"
          - "See future enhancement: docs/dev/README.md#storage-volume-backup-labels"

    - name: Get list of GaleraBackup cronjobs
      ansible.builtin.shell: |
        oc get cronjob -n {{ openstack_namespace }} -l app=galera -o jsonpath='{.items[*].metadata.name}'
      register: galera_backup_cronjobs
      changed_when: false

    - name: Print GaleraBackup cronjobs found
      ansible.builtin.debug:
        msg: "Found GaleraBackup cronjobs: {{ galera_backup_cronjobs.stdout.split() if galera_backup_cronjobs.stdout != '' else 'none' }}"

    - name: Trigger Galera backup jobs
      ansible.builtin.shell: |
        BACKUP_JOB_NAME="{{ item }}-{{ backup_date }}"
        oc -n {{ openstack_namespace }} create job --from=cronjob/{{ item }} ${BACKUP_JOB_NAME}
        echo ${BACKUP_JOB_NAME}
      loop: "{{ galera_backup_cronjobs.stdout.split() }}"
      register: galera_backup_jobs
      changed_when: true
      when: galera_backup_cronjobs.stdout != ""

    - name: Wait for Galera backup jobs to complete
      ansible.builtin.shell: |
        oc -n {{ openstack_namespace }} wait --for=condition=complete job/{{ item.stdout_lines[-1] }} --timeout={{ galera_backup_timeout }}
      loop: "{{ galera_backup_jobs.results }}"
      changed_when: false
      when: galera_backup_cronjobs.stdout != ""

    - name: Print Step 9 completion
      ansible.builtin.debug:
        msg: "✓ Galera database backups completed"
      when: galera_backup_cronjobs.stdout != ""

    - name: Print Step 9 skip message
      ansible.builtin.debug:
        msg: "No GaleraBackup cronjobs found, skipping database backup"
      when: galera_backup_cronjobs.stdout == ""

    # Step 10: Backup Storage Volumes (OADP)
    - name: Print Step 10 header
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "Step 10: Backup Storage Volumes (OADP)"
          - "========================================"
          - ""
          - "Backing up PVCs with label openstack.org/backup=true using CSI Volume Snapshots"
          - "REQUIRES: StorageClass with CSI snapshot support (LVM, Ceph RBD, cloud provider storage)"
          - "See: docs/dev/backup-restore-storage-volumes.md"
      when: not skip_pvc_backup

    - name: Check if OADP is installed
      ansible.builtin.shell: |
        oc get deployment velero -n {{ oadp_namespace }} &>/dev/null && echo "installed" || echo "not_installed"
      register: oadp_check
      changed_when: false
      when: not skip_pvc_backup

    - name: Check for PVCs with backup label
      ansible.builtin.shell: |
        oc get pvc -n {{ openstack_namespace }} -l openstack.org/backup=true --no-headers 2>/dev/null | wc -l
      register: pvc_count
      changed_when: false
      when: not skip_pvc_backup and oadp_check.stdout == "installed"

    - name: Print OADP not installed message
      ansible.builtin.debug:
        msg:
          - "OADP not found in namespace {{ oadp_namespace }}"
          - "Skipping PVC backup. To set up OADP, see: docs/dev/setup-oadp-minio.md"
          - ""
          - "To skip this check, use: -e skip_pvc_backup=true"
      when: not skip_pvc_backup and oadp_check.stdout == "not_installed"

    - name: Print no PVCs labeled message
      ansible.builtin.debug:
        msg:
          - "No PVCs found with label openstack.org/backup=true"
          - "Skipping PVC backup. To label PVCs, see: docs/dev/backup-restore-storage-volumes.md"
      when: not skip_pvc_backup and oadp_check.stdout == "installed" and pvc_count.stdout|int == 0

    - name: Create OADP backup for storage volumes
      ansible.builtin.shell: |
        BACKUP_NAME="openstack-volumes-{{ backup_date }}"
        cat <<EOF | oc apply -f -
        apiVersion: velero.io/v1
        kind: Backup
        metadata:
          name: ${BACKUP_NAME}
          namespace: {{ oadp_namespace }}
        spec:
          includedNamespaces:
          - {{ openstack_namespace }}
          labelSelector:
            matchLabels:
              openstack.org/backup: "true"
          snapshotVolumes: true
          defaultVolumesToFsBackup: false
          volumeSnapshotLocations: []
          storageLocation: velero-1
          ttl: 720h
        EOF
        echo ${BACKUP_NAME}
      register: oadp_backup
      changed_when: true
      when: not skip_pvc_backup and oadp_check.stdout == "installed" and pvc_count.stdout|int > 0

    - name: Wait for OADP backup to complete
      ansible.builtin.shell: |
        oc wait --for=jsonpath='{.status.phase}'=Completed \
          backup/{{ oadp_backup.stdout_lines[-1] }} \
          -n {{ oadp_namespace }} \
          --timeout={{ pvc_backup_timeout }}
      changed_when: false
      when: not skip_pvc_backup and oadp_check.stdout == "installed" and pvc_count.stdout|int > 0

    - name: Save Velero Backup CR for restore reference
      ansible.builtin.shell: |
        oc get backup {{ oadp_backup.stdout_lines[-1] }} -n {{ oadp_namespace }} -o json > "{{ backup_dir }}/velero-backup.json"
      changed_when: true
      when: not skip_pvc_backup and oadp_check.stdout == "installed" and pvc_count.stdout|int > 0

    - name: Print Step 9 completion
      ansible.builtin.debug:
        msg:
          - "✓ Storage volumes backed up: {{ oadp_backup.stdout_lines[-1] }}"
          - "✓ Backup CR saved to: velero-backup.json"
          - ""
          - "To validate CSI snapshots were created, run:"
          - "  docs/dev/scripts/validate-oadp-backup.sh {{ oadp_backup.stdout_lines[-1] }}"
      when: not skip_pvc_backup and oadp_check.stdout == "installed" and pvc_count.stdout|int > 0

    - name: Print Step 9 skipped
      ansible.builtin.debug:
        msg: "Step 9 skipped (skip_pvc_backup=true)"
      when: skip_pvc_backup

    - name: Print Step 11 header
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "Step 11: Create Backup Archive"
          - "========================================"

    - name: Create README.md
      ansible.builtin.shell: |
        cat > "{{ backup_dir }}/README.md" << 'EOF'
        # OpenStack Control Plane Backup

        Created: {{ backup_timestamp.stdout }}
        Source Cluster: {{ console_url.stdout | default('N/A') }}
        Namespace: {{ openstack_namespace }}

        **IMPORTANT:** This backup is only valid for fully updated environments.
        Restore is NOT supported for partially updated environments (e.g., operators
        updated but ControlPlane minor update not completed).

        ## Contents

        All backup files are in JSON format for consistency.

        ### Control Plane CRs
        - openstackcontrolplane-backup.json: Main control plane CR
        - openstackversion-backup.json: OpenStack version and container images
        - topology-backup.json: Topology configuration (if used)
        - bgpconfiguration-backup.json: BGP configuration (user customization, if used)
        - dnsdata-backup.json: DNS data without ownerReferences (user-created only)
        - instanceha-backup.json: Instance HA configuration (user customization, if used)

        ### Network Resources (ownerReferences removed)
        - network-attachment-definitions-backup.json: NetworkAttachmentDefinitions (CRITICAL)

        ### Secrets and ConfigMaps (ownerReferences removed)
        - secrets-all-backup.json: All secrets (includes OpenStack secrets, RabbitMQ, TLS CAs, certificates, database passwords)
        - configmaps-all-backup.json: All ConfigMaps

        ### MariaDB Resources (ownerReferences removed)
        - mariadbdatabase-backup.json: MariaDBDatabase CRs (database definitions)
        - mariadbaccount-backup.json: MariaDBAccount CRs (database account definitions, reference secrets for passwords)
        - galerabackup-backup.json: GaleraBackup CRs (user-created backup configuration - defines backup PVCs and schedules)

        ### TLS Infrastructure (ownerReferences removed)
        - issuer-backup.json: cert-manager Issuer CRs
        - certificates-backup.json: cert-manager Certificate CRs

        ### Operator Version Information
        - operator-versions.txt: Operator and platform versions (human-readable summary)
        - csv-backup.json: ClusterServiceVersion details
        - subscription-backup.json: Subscription details
        - installplan-backup.json: InstallPlan details

        ### RabbitMQ Resources
        - rabbitmquser-backup.json: RabbitMQUser CRs (user-created ones without ownerReferences will be restored, operator-managed ones with ownerReferences will be filtered out)

        ### Storage Volumes (OADP Backup Reference)
        - velero-backup.json: Velero Backup CR reference for storage volumes (if OADP backup was performed)
          The actual PVC data is stored in the OADP backup location (MinIO/S3).

          Includes backups of:
          - Galera database dumps (PVCs created by GaleraBackup CRs - must be manually labeled with openstack.org/backup=true)
          - Glance images (if labeled)
          - Cinder volumes (if labeled)
          - Swift objects (if labeled)
          - Manila shares (if labeled)

          See: docs/dev/backup-restore-storage-volumes.md
          Future enhancement (automatic labeling): docs/dev/README.md#storage-volume-backup-labels

        ## Restore Instructions

        See: docs/dev/backup-restore-ctlplane.md

        **IMPORTANT**: Target cluster must have matching operator versions!
        Check operator-versions.txt for required versions.
        EOF
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print README completion
      ansible.builtin.debug:
        msg: "✓ README.md created"

    - name: Create backup archive
      ansible.builtin.shell: |
        tar -czf openstack-ctlplane-backup-{{ backup_date }}.tar.gz openstack-ctlplane-backup-{{ backup_date }}
      args:
        executable: /bin/bash
        chdir: "{{ backup_dir_base }}"
      changed_when: true

    - name: Get archive size
      ansible.builtin.shell: |
        du -h {{ backup_dir_base }}/openstack-ctlplane-backup-{{ backup_date }}.tar.gz | cut -f1
      register: archive_size
      changed_when: false

    - name: Set OADP backup name for summary
      ansible.builtin.set_fact:
        oadp_backup_name: "{{ oadp_backup.stdout_lines[-1] if (oadp_backup is defined and oadp_backup.stdout_lines is defined) else 'N/A (skipped or not available)' }}"

    - name: Print backup completion summary
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "Backup completed successfully!"
          - "========================================"
          - "Backup directory: {{ backup_dir }}"
          - "Archive created: {{ backup_dir_base }}/openstack-ctlplane-backup-{{ backup_date }}.tar.gz"
          - "Archive size: {{ archive_size.stdout }}"
          - ""
          - "Storage Volumes (OADP):"
          - "  Backup name: {{ oadp_backup_name }}"
          - "  OADP namespace: {{ oadp_namespace }}"
          - "  Location: MinIO/S3 (not in archive)"
          - ""
          - "Next steps:"
          - "1. Review operator-versions.txt for required operator versions"
          - "2. Store backup archive securely"
          - "3. Ensure OADP backup is also available in MinIO/S3"
          - "4. Test restore on a test cluster before relying on this backup"
