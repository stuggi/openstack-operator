---
# OpenStack Control Plane Backup Playbook
# This playbook performs a backup of the stateless OpenStack control plane
# following the documented procedure in backup-restore-stateless.md
#
# Usage:
#   ansible-playbook backup-openstack-ctlplane.yaml
#   ansible-playbook backup-openstack-ctlplane.yaml -e openstack_namespace=my-openstack
#   ansible-playbook backup-openstack-ctlplane.yaml -e backup_dir_base=/custom/backup/path

- name: Backup OpenStack Control Plane
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Set backup timestamp (evaluate once)
      ansible.builtin.shell: date +%Y%m%d-%H%M%S
      register: backup_date_result
      changed_when: false

    - name: Set default variables
      ansible.builtin.set_fact:
        backup_date: "{{ backup_date_result.stdout }}"
        openstack_namespace: "{{ openstack_namespace | default('openstack') }}"
        backup_dir_base_input: "{{ backup_dir_base | default('./backups') }}"

    - name: Resolve absolute backup directory path
      ansible.builtin.set_fact:
        backup_dir_base: "{{ backup_dir_base_input if backup_dir_base_input.startswith('/') else (lookup('env', 'PWD') + '/' + backup_dir_base_input) }}"

    - name: Set backup directory
      ansible.builtin.set_fact:
        backup_dir: "{{ backup_dir_base }}/openstack-ctlplane-backup-{{ backup_date }}"

    - name: Get current timestamp in ISO8601 format
      ansible.builtin.shell: date -u +"%Y-%m-%dT%H:%M:%SZ"
      register: backup_timestamp
      changed_when: false

    - name: Print backup header
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "OpenStack Control Plane Backup"
          - "========================================"
          - "Namespace: {{ openstack_namespace }}"
          - "Backup base directory: {{ backup_dir_base }}"
          - "Backup directory: {{ backup_dir }}"

    - name: Create backup directory
      ansible.builtin.shell: mkdir -p "{{ backup_dir }}"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 1 - Backup OpenStackControlPlane CR
      ansible.builtin.shell: |
        oc get openstackcontrolplane -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/openstackcontrolplane-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 1 completion
      ansible.builtin.debug:
        msg: "✓ OpenStackControlPlane CR backed up"

    - name: Step 2 - Backup OpenStackVersion
      ansible.builtin.shell: |
        oc get openstackversion -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/openstackversion-backup.json
      args:
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Step 2 - Backup NetConfig (CRITICAL)
      ansible.builtin.shell: |
        oc get netconfig -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/netconfig-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 2 - Backup Topology
      ansible.builtin.shell: |
        oc get topology -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/topology-backup.json
      args:
        executable: /bin/bash
      changed_when: true
      failed_when: false

    - name: Print Step 2 completion
      ansible.builtin.debug:
        msg: "✓ Related Custom Resources backed up"

    - name: Step 3 - Backup NetworkAttachmentDefinitions
      ansible.builtin.shell: |
        oc get network-attachment-definition -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/network-attachment-definitions-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 3 completion
      ansible.builtin.debug:
        msg: "✓ NetworkAttachmentDefinitions backed up"

    - name: Step 4 - Backup Secrets (excluding auto-generated)
      ansible.builtin.shell: |
        oc get secrets -n {{ openstack_namespace }} -o json | \
          jq '.items |= map(select(.type != "kubernetes.io/dockercfg" and .type != "kubernetes.io/service-account-token")) |
              del(.items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/secrets-all-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Count backed up secrets
      ansible.builtin.shell: |
        jq '.items | length' {{ backup_dir }}/secrets-all-backup.json
      register: secret_count
      changed_when: false

    - name: Print Step 4 completion
      ansible.builtin.debug:
        msg:
          - "✓ {{ secret_count.stdout }} secrets backed up (excludes auto-generated system secrets)"
          - "  Note: ownerReferences preserved for restore filtering"

    - name: Step 5 - Backup MariaDBDatabase CRs
      ansible.builtin.shell: |
        oc get mariadbdatabase -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/mariadbdatabase-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 5 - Backup MariaDBAccount CRs
      ansible.builtin.shell: |
        oc get mariadbaccount -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/mariadbaccount-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 5 completion
      ansible.builtin.debug:
        msg: "✓ MariaDB resources backed up"

    - name: Step 6 - Backup Issuer CRs
      ansible.builtin.shell: |
        oc get issuer -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/issuer-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 6 - Backup Certificate CRs
      ansible.builtin.shell: |
        oc get certificate -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/certificates-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 6 completion
      ansible.builtin.debug:
        msg: "✓ TLS Issuers and Certificates backed up"

    - name: Step 7 - Backup ConfigMaps
      ansible.builtin.shell: |
        oc get configmaps -n {{ openstack_namespace }} -o json | \
          jq 'del(.items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/configmaps-all-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 7 completion
      ansible.builtin.debug:
        msg:
          - "✓ All ConfigMaps backed up"
          - "  Note: ownerReferences preserved for restore filtering"

    - name: Step 8 - Get cluster information
      ansible.builtin.shell: |
        oc version -o json | jq -r '.openshiftVersion'
      register: openshift_version
      changed_when: false
      failed_when: false

    - name: Step 8 - Get Kubernetes version
      ansible.builtin.shell: |
        oc version -o json | jq -r '.serverVersion.gitVersion'
      register: k8s_version
      changed_when: false
      failed_when: false

    - name: Step 8 - Get console URL
      ansible.builtin.shell: |
        oc whoami --show-console
      register: console_url
      changed_when: false
      failed_when: false

    - name: Step 8 - Get current user
      ansible.builtin.shell: |
        oc whoami
      register: current_user
      changed_when: false

    - name: Step 8 - Get global storageClass
      ansible.builtin.shell: |
        oc get openstackcontrolplane -n {{ openstack_namespace }} -o jsonpath='{.items[0].spec.storageClass}'
      register: global_storage_class
      changed_when: false
      failed_when: false

    - name: Step 8 - Get available StorageClasses
      ansible.builtin.shell: |
        oc get storageclass --no-headers | awk '{print "  - " $1}'
      register: storage_classes
      changed_when: false

    - name: Step 8 - Get CSVs
      ansible.builtin.shell: |
        oc get csv -n openstack-operators
      register: csv_list
      changed_when: false

    - name: Step 8 - Get Subscriptions
      ansible.builtin.shell: |
        oc get subscription -n openstack-operators
      register: subscription_list
      changed_when: false

    - name: Step 8 - Get InstallPlans
      ansible.builtin.shell: |
        oc get installplan -n openstack-operators
      register: installplan_list
      changed_when: false

    - name: Step 8 - Create operator-versions.txt
      ansible.builtin.shell: |
        cat > "{{ backup_dir }}/operator-versions.txt" << 'EOF'
        ========================================
        OpenStack Control Plane Backup Metadata
        ========================================
        Backup Date: {{ backup_timestamp.stdout }}
        Backup Created By: {{ current_user.stdout }}

        OpenShift Cluster Information:
        - Cluster Version: {{ openshift_version.stdout | default('N/A') }}
        - Kubernetes Version: {{ k8s_version.stdout | default('N/A') }}
        - Console URL: {{ console_url.stdout | default('N/A') }}

        Namespace: {{ openstack_namespace }}

        Installed Operators (ClusterServiceVersions):
        {{ csv_list.stdout }}

        Operator Subscriptions:
        {{ subscription_list.stdout }}

        Install Plans:
        {{ installplan_list.stdout }}

        Storage Configuration:
        Note: Services can override the global storageClass with service-specific parameters
        - Global StorageClass: {{ global_storage_class.stdout | default('N/A') }}
        - Available StorageClasses in cluster:
        {{ storage_classes.stdout }}
        EOF
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 8 - Backup CSV details
      ansible.builtin.shell: |
        oc get csv -n openstack-operators -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/csv-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 8 - Backup Subscription details
      ansible.builtin.shell: |
        oc get subscription -n openstack-operators -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/subscription-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Step 8 - Backup InstallPlan details
      ansible.builtin.shell: |
        oc get installplan -n openstack-operators -o json | \
          jq 'del(.items[].metadata.ownerReferences,
                  .items[].metadata.uid,
                  .items[].metadata.resourceVersion,
                  .items[].metadata.creationTimestamp,
                  .items[].metadata.managedFields,
                  .items[].metadata.annotations."kubectl.kubernetes.io/last-applied-configuration",
                  .metadata)' > {{ backup_dir }}/installplan-backup.json
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print Step 8 completion
      ansible.builtin.debug:
        msg: "✓ Operator versions documented"

    - name: Create README.md
      ansible.builtin.shell: |
        cat > "{{ backup_dir }}/README.md" << 'EOF'
        # OpenStack Control Plane Backup

        Created: {{ backup_timestamp.stdout }}
        Source Cluster: {{ console_url.stdout | default('N/A') }}
        Namespace: {{ openstack_namespace }}

        ## Contents

        All backup files are in JSON format for consistency.

        ### Control Plane CRs
        - openstackcontrolplane-backup.json: Main control plane CR
        - openstackversion-backup.json: OpenStack version and container images
        - netconfig-backup.json: Network configuration (CRITICAL)
        - topology-backup.json: Topology configuration (if used)

        ### Network Resources (ownerReferences removed)
        - network-attachment-definitions-backup.json: NetworkAttachmentDefinitions (CRITICAL)

        ### Secrets and ConfigMaps (ownerReferences removed)
        - secrets-all-backup.json: All secrets (includes OpenStack secrets, RabbitMQ, TLS CAs, certificates, database passwords)
        - configmaps-all-backup.json: All ConfigMaps

        ### MariaDB Resources (ownerReferences removed)
        - mariadbdatabase-backup.json: MariaDBDatabase CRs (database definitions)
        - mariadbaccount-backup.json: MariaDBAccount CRs (database account definitions, reference secrets for passwords)

        ### TLS Infrastructure (ownerReferences removed)
        - issuer-backup.json: cert-manager Issuer CRs
        - certificates-backup.json: cert-manager Certificate CRs

        ### Operator Version Information
        - operator-versions.txt: Operator and platform versions (human-readable summary)
        - csv-backup.json: ClusterServiceVersion details
        - subscription-backup.json: Subscription details
        - installplan-backup.json: InstallPlan details

        ## Restore Instructions

        See: docs/dev/backup-restore-stateless.md

        **IMPORTANT**: Target cluster must have matching operator versions!
        Check operator-versions.txt for required versions.
        EOF
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print README completion
      ansible.builtin.debug:
        msg: "✓ README.md created"

    - name: Create backup archive
      ansible.builtin.shell: |
        tar -czf openstack-ctlplane-backup-{{ backup_date }}.tar.gz openstack-ctlplane-backup-{{ backup_date }}
      args:
        executable: /bin/bash
        chdir: "{{ backup_dir_base }}"
      changed_when: true

    - name: Get archive size
      ansible.builtin.shell: |
        du -h {{ backup_dir_base }}/openstack-ctlplane-backup-{{ backup_date }}.tar.gz | cut -f1
      register: archive_size
      changed_when: false

    - name: Print backup completion summary
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "Backup completed successfully!"
          - "========================================"
          - "Backup directory: {{ backup_dir }}"
          - "Archive created: {{ backup_dir_base }}/openstack-ctlplane-backup-{{ backup_date }}.tar.gz"
          - "Archive size: {{ archive_size.stdout }}"
          - ""
          - "Next steps:"
          - "1. Review operator-versions.txt for required operator versions"
          - "2. Store backup archive securely"
          - "3. Test restore on a test cluster before relying on this backup"
          - ""
          - "Example storage commands:"
          - "  scp {{ backup_dir_base }}/openstack-ctlplane-backup-{{ backup_date }}.tar.gz backup-server:/backups/"
          - "  oc create secret generic openstack-backup-{{ backup_date }} --from-file={{ backup_dir_base }}/openstack-ctlplane-backup-{{ backup_date }}.tar.gz -n openstack-backups"
