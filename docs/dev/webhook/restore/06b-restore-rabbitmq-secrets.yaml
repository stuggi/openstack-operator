---
# Restore Order 50b: RabbitMQ Credentials
# Restores all secrets from the backup to a temporary namespace so that
# the original *-default-user secrets can be copied as *-restored-user
# into the target namespace. This is needed because the new RabbitMQ
# clusters generate random credentials, but EDPM nodes still use the
# original ones.
#
# Usage:
#   1. Create the resource modifier ConfigMap to strip finalizers:
#      oc apply -f - <<EOF
#      apiVersion: v1
#      kind: ConfigMap
#      metadata:
#        name: openstack-restore-tmp-resource-modifiers
#        namespace: openshift-adp
#      data:
#        resource-modifiers.yaml: |
#          version: v1
#          resourceModifierRules:
#          - conditions:
#              groupResource: "*"
#              namespaces:
#              - openstack-restore-tmp
#            mergePatches:
#            - patchData: |
#                metadata:
#                  finalizers: null
#      EOF
#   2. Apply this restore CR (secrets go to openstack-restore-tmp)
#   3. Copy the old credentials:
#      for CLUSTER in rabbitmq rabbitmq-cell1; do
#        oc extract secret/${CLUSTER}-default-user -n openstack-restore-tmp --to=/tmp/rmq-${CLUSTER} --confirm
#        oc create secret generic ${CLUSTER}-restored-user -n openstack --from-file=/tmp/rmq-${CLUSTER}
#        rm -rf /tmp/rmq-${CLUSTER}
#      done
#   4. Create RabbitMQUser CRs (see 06-manual-database-restore.md, Step 6)
#   5. Clean up:
#      oc delete namespace openstack-restore-tmp
#
# Prerequisite:
#   oc create namespace openstack-restore-tmp
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: openstack-restore-rabbitmq-secrets
  namespace: openshift-adp
spec:
  backupName: openstack-backup-resources

  # Restore from the openstack namespace
  includedNamespaces:
  - openstack

  # Map to a temporary namespace to avoid conflicts
  namespaceMapping:
    openstack: openstack-restore-tmp

  # Only restore secrets
  includedResources:
  - secrets

  # Strip finalizers so temp namespace can be deleted cleanly
  resourceModifier:
    kind: ConfigMap
    name: openstack-restore-tmp-resource-modifiers
