---
# Restore Order 40: Backup Configuration
# Restores GaleraBackup and other backup-related configuration CRs
# Must be restored after OpenStackControlPlane (order 30)
#
# Prerequisite: Create the resource modifier ConfigMap first:
#   oc apply -f 00-resource-modifiers-configmap.yaml
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: openstack-restore-40-backup-config
  namespace: openshift-adp
spec:
  backupName: openstack-backup-resources

  # Restore to the same namespace
  includedNamespaces:
  - openstack

  # Only restore resources with backup-restore label and order 40
  labelSelector:
    matchLabels:
      openstack.org/backup-restore: "true"
      openstack.org/backup-restore-order: "40"

  # Remove last-applied-configuration via ConfigMap-based resource modifiers
  resourceModifier:
    ref:
      kind: ConfigMap
      name: openstack-restore-resource-modifiers
