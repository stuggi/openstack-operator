---
# Restore Order 60: DataPlane Resources
# Restores OpenStackDataPlaneNodeSet and related dataplane resources
# Must be restored after ControlPlane is fully operational (after order 50 manual steps)
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: openstack-restore-60-dataplane
  namespace: openshift-adp
spec:
  backupName: openstack-backup-resources

  # Restore to the same namespace
  includedNamespaces:
  - openstack

  # Only restore resources with backup-restore label and order 60
  labelSelector:
    matchLabels:
      openstack.org/backup-restore: "true"
      openstack.org/backup-restore-order: "60"

  # Remove ownerReferences and last-applied-configuration
  resourceModifiers:
  - conditions: {}
    patches:
    - operation: remove
      path: "/metadata/ownerReferences"
    - operation: remove
      path: "/metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration"

