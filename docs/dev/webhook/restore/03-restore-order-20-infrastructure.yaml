---
# Restore Order 20: Infrastructure CRs
# Restores OpenStackVersion, OpenStackBackupConfig, MariaDBAccount, MariaDBDatabase
# Must be restored before OpenStackControlPlane
#
# Prerequisite: Create the resource modifier ConfigMap first:
#   oc apply -f 00-resource-modifiers-configmap.yaml
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: openstack-restore-20-infrastructure
  namespace: openshift-adp
spec:
  backupName: openstack-backup-resources

  # Restore to the same namespace
  includedNamespaces:
  - openstack

  # Only restore resources with backup-restore label and order 20
  labelSelector:
    matchLabels:
      openstack.org/backup-restore: "true"
      openstack.org/backup-restore-order: "20"

  # Remove last-applied-configuration via ConfigMap-based resource modifiers
  resourceModifier:
    kind: ConfigMap
    name: openstack-restore-resource-modifiers
