---
# Restore Order 30: OpenStackControlPlane (Staged)
# Restores the OpenStackControlPlane CR with deployment-stage annotation
# This tells the controller to only deploy infrastructure, not full services
# Must be restored after infrastructure CRs (order 20)
# Manual database restore happens at order 50 before removing this annotation
apiVersion: velero.io/v1
kind: Restore
metadata:
  name: openstack-restore-30-controlplane
  namespace: openshift-adp
spec:
  backupName: openstack-backup-resources

  # Restore to the same namespace
  includedNamespaces:
  - openstack

  # Only restore resources with backup-restore label and order 30
  labelSelector:
    matchLabels:
      openstack.org/backup-restore: "true"
      openstack.org/backup-restore-order: "30"

  # Remove ownerReferences and last-applied-configuration
  # Add deployment-stage annotation to prevent full deployment
  resourceModifiers:
  - conditions: {}
    patches:
    - operation: remove
      path: "/metadata/ownerReferences"
    - operation: remove
      path: "/metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration"
    - operation: add
      path: "/metadata/annotations/openstack.org~1deployment-stage"
      value: "infrastructure-only"

