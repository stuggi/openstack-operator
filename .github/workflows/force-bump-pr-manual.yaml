name: Manually Trigger a Force Bump PR

on:
  workflow_dispatch:

jobs:
  call-build-workflow:
    uses: stuggi/openstack-k8s-operators-ci/.github/workflows/force-bump-pull-request.yaml@OSPRH-17779-image
    with:
      operator_name: openstack
      branch_name: ${{ github.ref_name }}
    secrets:
      FORCE_BUMP_PULL_REQUEST_PAT: ${{ secrets.FORCE_BUMP_PULL_REQUEST_PAT }}
